        <main class="main-content">
            <header class="dashboard-header">
                <h1>Apply for Leave</h1>
            </header>

            <div class="page-content">
                <!-- Leave Balance Preview -->
                <div class="card" style="margin-bottom: 1.5rem; background: #f0fdf4; border-left: 4px solid #22c55e;">
                    <div style="padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h4 style="margin: 0 0 0.5rem 0; color: #166534;">Your Leave Balance</h4>
                            <p style="margin: 0; color: #15803d; font-size: 0.9rem;">
                                Available: <strong id="balance-preview">-</strong> | 
                                Cycle: <span id="cycle-preview">-</span>
                            </p>
                        </div>
                        <div id="probation-badge" style="display: none; background: #fef3c7; color: #92400e; padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.85rem;">
                            In Probation - Unpaid Only
                        </div>
                    </div>
                </div>
                
                <div class="card" style="max-width: 600px;">
                    <form id="leave-form" class="profile-form">
                        <div class="form-group">
                            <label class="form-label">Leave Type</label>
                            <select name="leaveType" id="leaveType" class="form-input" required>
                                <option value="CASUAL">Casual Leave</option>
                                <option value="SICK">Sick Leave</option>
                                <option value="ANNUAL">Annual Leave</option>
                                <option value="MATERNITY">Maternity Leave</option>
                                <option value="PATERNITY">Paternity Leave</option>
                                <option value="HALF_DAY">Half Day Leave</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Start Date</label>
                                <input type="date" name="startDate" id="startDate" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">End Date</label>
                                <input type="date" name="endDate" id="endDate" class="form-input" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="isHalfDay" style="width: 18px; height: 18px;">
                                <span>Half Day Leave (only 0.5 day will be deducted)</span>
                            </label>
                        </div>
                        <div id="leave-preview" class="form-group" style="background: #f8fafc; padding: 1rem; border-radius: 0.375rem; display: none;">
                            <h4 style="margin: 0 0 0.5rem 0; color: #1e293b;">Leave Preview</h4>
                            <p style="margin: 0.25rem 0; color: #475569; font-size: 0.9rem;">Total Days: <strong id="preview-total">0</strong></p>
                            <p style="margin: 0.25rem 0; color: #166534; font-size: 0.9rem;">Paid Days: <strong id="preview-paid">0</strong></p>
                            <p style="margin: 0.25rem 0; color: #991b1b; font-size: 0.9rem;">Unpaid Days: <strong id="preview-unpaid">0</strong></p>
                            <p id="preview-message" style="margin: 0.5rem 0 0 0; color: #0ea5e9; font-size: 0.85rem;"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Reason</label>
                            <textarea name="reason" id="reason" class="form-input" rows="4" required placeholder="Please provide a reason for your leave..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Contact Number (during leave)</label>
                            <input type="tel" name="contact" id="contact" class="form-input" placeholder="Optional">
                        </div>
                        <button type="submit" class="btn-auth">Submit Leave Application</button>
                        <a href="my-leaves.html" style="display: block; text-align: center; margin-top: 1rem; color: #6b7280;">View my leave history</a>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        const user = auth.getCurrentUser();
        let leaveBalance = {};
        
        // Load leave balance on page load
        async function loadLeaveBalance() {
            try {
                const res = await auth.apiCall('/api/leaves/balance');
                if (res && res.ok) {
                    leaveBalance = await res.json();
                    document.getElementById('balance-preview').textContent = (leaveBalance.availableLeaves || 0) + ' days';
                    document.getElementById('cycle-preview').textContent = 'Cycle ' + (leaveBalance.cycle || 1) + ' - ' + (leaveBalance.year || new Date().getFullYear());
                    
                    // Show probation badge if applicable
                    if (leaveBalance.inProbation) {
                        document.getElementById('probation-badge').style.display = 'block';
                    }
                }
            } catch (e) { console.error('Failed to load balance', e); }
        }
        
        loadLeaveBalance();
        
        // Set min date to today
        document.getElementById('startDate').min = new Date().toISOString().split('T')[0];
        document.getElementById('endDate').min = new Date().toISOString().split('T')[0];
        
        // Calculate leave preview when dates change
        function updateLeavePreview() {
            const startInput = document.getElementById('startDate').value;
            const endInput = document.getElementById('endDate').value;
            const isHalfDay = document.getElementById('isHalfDay').checked;
            
            if (!startInput || !endInput) return;
            
            const start = new Date(startInput);
            const end = new Date(endInput);
            
            if (end < start) return;
            
            // Calculate total days
            let totalDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            if (isHalfDay) totalDays = 1;
            
            // Calculate paid/unpaid based on policy
            let paidDays = 0;
            let unpaidDays = 0;
            let message = '';
            
            if (leaveBalance.inProbation) {
                // During probation - all unpaid
                paidDays = 0;
                unpaidDays = totalDays;
                message = 'During probation period, all leaves are unpaid.';
            } else {
                const availableBalance = leaveBalance.availableLeaves || 0;
                // Max 3 paid at once
                const maxPaid = Math.min(3, availableBalance);
                
                if (totalDays <= maxPaid) {
                    paidDays = totalDays;
                    unpaidDays = 0;
                    message = 'All ' + totalDays + ' day(s) will be paid leave.';
                } else {
                    paidDays = maxPaid;
                    unpaidDays = totalDays - maxPaid;
                    message = 'Only ' + paidDays + ' day(s) will be paid (max 3 at once). ' + unpaidDays + ' day(s) will be unpaid.';
                }
                
                if (isHalfDay) {
                    message += ' (Half day: 0.5 day deduction)';
                }
            }
            
            // Show preview
            document.getElementById('leave-preview').style.display = 'block';
            document.getElementById('preview-total').textContent = totalDays;
            document.getElementById('preview-paid').textContent = paidDays;
            document.getElementById('preview-unpaid').textContent = unpaidDays;
            document.getElementById('preview-message').textContent = message;
        }
        
        document.getElementById('startDate').addEventListener('change', updateLeavePreview);
        document.getElementById('endDate').addEventListener('change', updateLeavePreview);
        document.getElementById('isHalfDay').addEventListener('change', updateLeavePreview);
        
        document.getElementById('leave-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const start = new Date(document.getElementById('startDate').value);
            const end = new Date(document.getElementById('endDate').value);
            
            if (end < start) {
                return auth.showNotification('End date cannot be before start date', 'error');
            }
            
            // Check if applying for more than available (with some buffer for unpaid)
            const totalDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            if (!leaveBalance.inProbation && totalDays > 10) {
                if (!confirm('You are applying for ' + totalDays + ' days. Excess days beyond your paid balance will be unpaid. Continue?')) {
                    return;
                }
            }
            
            const form = e.target;
            try {
                const res = await auth.apiCall('/api/leaves/apply', {
                    method: 'POST',
                    body: JSON.stringify({
                        employeeId: user.id,
                        leaveType: document.getElementById('leaveType').value,
                        startDate: document.getElementById('startDate').value,
                        endDate: document.getElementById('endDate').value,
                        reason: document.getElementById('reason').value,
                        isHalfDay: document.getElementById('isHalfDay').checked,
                        contactNumber: document.getElementById('contact').value
                    })
                });
                if (res && res.ok) {
                    const result = await res.json();
                    let msg = 'Leave application submitted successfully';
                    if (result.paidDays !== undefined && result.unpaidDays !== undefined) {
                        msg += '. Paid: ' + result.paidDays + ' days, Unpaid: ' + result.unpaidDays + ' days';
                    }
                    auth.showNotification(msg, 'success');
                    form.reset();
                    document.getElementById('leave-preview').style.display = 'none';
                    loadLeaveBalance(); // Refresh balance
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        function logout() { auth.logout(); }
    </script>
</body>
