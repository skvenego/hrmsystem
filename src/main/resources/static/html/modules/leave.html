<!-- Leave Section Module -->
<!-- Backend: Leave.java - id, employee, leaveType (SICK, CASUAL, ANNUAL, MATERNITY, PATERNITY, UNPAID), startDate, endDate, totalDays, reason, status (PENDING, APPROVED, REJECTED, CANCELLED), approvedBy, rejectionReason, appliedDate -->
<div class="card">
    <h2>📝 Submit Leave Request</h2>
    <form id="leaveForm" onsubmit="handleLeaveSubmit(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Leave Type *</label>
                <select id="leaveType" name="leaveType" required>
                    <option value="">Select Leave Type</option>
                    <option value="SICK">Sick Leave</option>
                    <option value="CASUAL">Casual Leave</option>
                    <option value="ANNUAL">Annual Leave</option>
                    <option value="MATERNITY">Maternity Leave</option>
                    <option value="PATERNITY">Paternity Leave</option>
                    <option value="UNPAID">Unpaid Leave</option>
                </select>
            </div>
            <div class="form-group">
                <label>Total Days</label>
                <input type="number" id="totalDays" name="totalDays" readonly placeholder="Auto calculated">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Start Date *</label>
                <input type="date" id="startDate" name="startDate" required onchange="calculateLeaveDays()">
            </div>
            <div class="form-group">
                <label>End Date *</label>
                <input type="date" id="endDate" name="endDate" required onchange="calculateLeaveDays()">
            </div>
        </div>
        
        <div class="form-group">
            <label>Reason *</label>
            <textarea id="reason" name="reason" placeholder="Enter reason for leave" rows="3" required></textarea>
        </div>
        
        <button type="submit">📤 Submit Leave Request</button>
    </form>
</div>

<div class="card">
    <h3>📋 My Leave History</h3>
    <table class="data-table" id="leaveHistoryTable">
        <thead>
            <tr>
                <th>Applied Date</th>
                <th>Type</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Days</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Approved By</th>
            </tr>
        </thead>
        <tbody id="leaveHistory">
            <!-- Loaded dynamically from Leave.java -->
        </tbody>
    </table>
</div>
