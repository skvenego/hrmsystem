<!-- Profile Section Module -->
<!-- Backend: User.java - id, username, email, password, role (ROLE_BM, ROLE_HR, ROLE_ACCOUNTANT, ROLE_DIRECTOR, ROLE_EMPLOYEE, ROLE_ADMIN), phone, address, isActive, createdAt, lastLogin -->
<div class="header">
    <h1>👤 My Profile</h1>
    <p>Manage your account information</p>
</div>

<div class="card">
    <h2>👤 User Information</h2>
    <form id="profileForm" onsubmit="handleProfileSubmit(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="profileUsername" name="username" readonly class="readonly-field">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="profileEmail" name="email" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="profilePhone" name="phone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" id="profileRole" name="role" readonly class="readonly-field">
            </div>
        </div>
        
        <div class="form-group full-width">
            <label>Address</label>
            <textarea id="profileAddress" name="address" placeholder="Enter your address" rows="3"></textarea>
        </div>
        
        <div class="form-actions" style="text-align: center; margin-top: 20px;">
            <button type="submit">💾 Update Profile</button>
        </div>
    </form>
</div>

<div class="card">
    <h2>🔒 Change Password</h2>
    <form id="passwordForm" onsubmit="changePassword(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Current Password *</label>
                <input type="password" id="currentPassword" name="currentPassword" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>New Password *</label>
                <input type="password" id="newPassword" name="newPassword" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
        </div>
        <div class="form-actions" style="text-align: center; margin-top: 20px;">
            <button type="submit">🔒 Change Password</button>
        </div>
    </form>
</div>
