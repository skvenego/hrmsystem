<!-- Payroll Section Module -->
<!-- Backend: Payroll.java - id, employee, month, year, basicSalary, hra, da, ta, otherAllowances, providentFund, tax, insurance, otherDeductions, grossSalary, totalDeductions, netSalary, paymentDate, status (PENDING, PROCESSED, PENDING_APPROVAL, PAID), requiresDualApproval, accountantApproved, directorApproved -->
<div class="header">
    <h1>💰 Payroll Management</h1>
    <p>Manage employee salaries and payroll processing</p>
</div>

<div class="card" id="generatePayrollCard" style="display: none;">
    <h2>🔄 Generate Payroll</h2>
    <form id="payrollForm" onsubmit="generatePayroll(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Employee *</label>
                <select id="payrollEmployee" name="employeeId" required>
                    <option value="">Select Employee</option>
                </select>
            </div>
            <div class="form-group">
                <label>Month/Year *</label>
                <input type="month" id="payrollMonthYear" name="monthYear" required>
            </div>
        </div>
        
        <h3 style="margin-top: 20px; color: var(--primary);">Earnings</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Basic Salary *</label>
                <input type="number" id="payrollBasicSalary" name="basicSalary" step="0.01" required>
            </div>
            <div class="form-group">
                <label>HRA</label>
                <input type="number" id="payrollHra" name="hra" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>DA</label>
                <input type="number" id="payrollDa" name="da" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>TA</label>
                <input type="number" id="payrollTa" name="ta" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div class="form-group">
            <label>Other Allowances</label>
            <input type="number" id="payrollOtherAllowances" name="otherAllowances" step="0.01" placeholder="0.00">
        </div>
        
        <h3 style="margin-top: 20px; color: var(--danger);">Deductions</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Provident Fund (PF)</label>
                <input type="number" id="payrollPf" name="providentFund" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Tax</label>
                <input type="number" id="payrollTax" name="tax" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Insurance</label>
                <input type="number" id="payrollInsurance" name="insurance" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Other Deductions</label>
                <input type="number" id="payrollOtherDeductions" name="otherDeductions" step="0.01" placeholder="0.00">
            </div>
        </div>
        
        <div class="form-actions" style="text-align: center; margin-top: 20px;">
            <button type="submit">🔄 Generate Payroll</button>
            <button type="button" onclick="hideGeneratePayrollForm()" class="btn-secondary">❌ Cancel</button>
        </div>
    </form>
</div>

<div class="card">
    <h2>📋 Payroll Records</h2>
    <div class="actions-bar">
        <input type="month" id="payrollFilterMonth" class="filter-select">
        <select id="payrollFilterStatus" class="filter-select">
            <option value="">All Status</option>
            <option value="PENDING">Pending</option>
            <option value="PROCESSED">Processed</option>
            <option value="PENDING_APPROVAL">Pending Approval</option>
            <option value="PAID">Paid</option>
        </select>
        <button onclick="searchPayroll()">� Search</button>
        <button onclick="showGeneratePayrollForm()">➕ Generate Payroll</button>
        <button onclick="exportPayroll()">📥 Export</button>
    </div>
    <table class="data-table" id="payrollTable">
        <thead>
            <tr>
                <th>Employee</th>
                <th>Month/Year</th>
                <th>Gross Salary</th>
                <th>Total Deductions</th>
                <th>Net Salary</th>
                <th>Status</th>
                <th>Approval</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="payrollList">
            <!-- Loaded dynamically from Payroll.java -->
        </tbody>
    </table>
</div>
