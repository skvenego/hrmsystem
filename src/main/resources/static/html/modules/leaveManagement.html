<!-- Leave Management Section Module -->
<div class="card">
    <h2>Leave Management</h2>
    <div class="actions-bar">
        <button onclick="refreshLeaveRequests()">🔄 Refresh</button>
        <button onclick="exportLeaveRequests()">📥 Export</button>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Employee</th>
                <th>Leave Type</th>
                <th>Reason</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="leaveManagementList">
            <tr>
                <td>Sachin Employee</td>
                <td>Casual</td>
                <td>Personal work</td>
                <td>2026-03-20</td>
                <td>2026-03-20</td>
                <td><span class="badge warning">Pending</span></td>
                <td>
                    <button onclick="approveLeave('1')">✅ Approve</button>
                    <button onclick="rejectLeave('1')">❌ Reject</button>
                </td>
            </tr>
            <tr>
                <td>HR Manager</td>
                <td>Sick</td>
                <td>Fever</td>
                <td>2026-03-15</td>
                <td>2026-03-16</td>
                <td><span class="badge success">Approved</span></td>
                <td>
                    <button onclick="viewLeaveDetails('2')">👁️ View</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
