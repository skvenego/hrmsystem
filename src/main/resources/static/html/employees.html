<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                    </div>
                    <h1>Employees</h1>
                </div>
                <div class="header-actions">
                    <input type="text" id="search-input" placeholder="Search employees..." class="search-input" style="margin-right: 0.75rem;">
                    <a href="employee-form.html" class="btn-primary">+ Add Employee</a>
                    <button class="icon-btn" onclick="auth.logout()" title="Logout">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">

            <div class="page-content">
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Department</th>
                                    <th>Designation</th>
                                    <th>Salary</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employees-table">
                                <tr><td colspan="9" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireManagement()) throw new Error('Management access required');
        
        // Load employees
        async function loadEmployees() {
            try {
                const res = await auth.apiCall('/api/employees');
                if (!res || !res.ok) throw new Error('Failed to load');
                const employees = await res.json();
                
                const tbody = document.getElementById('employees-table');
                if (employees.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 2rem;">No employees found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = employees.map(emp => `
                    <tr>
                        <td>${emp.id}</td>
                        <td>${emp.firstName} ${emp.lastName}</td>
                        <td>${emp.email || 'N/A'}</td>
                        <td>${emp.phone || 'N/A'}</td>
                        <td>${emp.departmentName || emp.department?.name || emp.department || 'N/A'}</td>
                        <td>${emp.designation || 'N/A'}</td>
                        <td>${auth.formatCurrency(emp.salary || 0)}</td>
                        <td><span class="status-badge ${(emp.status || 'Active').toLowerCase()}">${emp.status || 'Active'}</span></td>
                        <td>
                            <a href="employee-form.html?edit=${emp.id}" class="btn-small">Edit</a>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('employees-table').innerHTML = '<tr><td colspan="9" style="text-align: center; color: red; padding: 2rem;">Error loading employees</td></tr>';
            }
        }
        
        // No need for logout function - handled by sidebar.js
        
        // Search functionality
        document.getElementById('search-input')?.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#employees-table tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });
        
        loadEmployees();
    </script>
</body>
</html>
