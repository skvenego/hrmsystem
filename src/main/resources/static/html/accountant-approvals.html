<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Approvals - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                    </div>
                    <h1>Pending Approvals</h1>
                </div>
                <span class="badge-warning">Accountant View</span>

            <div class="page-content">
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Month</th><th>Net Salary</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="approvals-table">
                                <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Payroll Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Payroll Approval Details</h2>
                <button onclick="closeModal()" class="close-btn">&times;</button>
            </div>
            <div id="modal-content-body">
                <!-- Content loaded dynamically -->
            </div>
            <div class="modal-actions">
                <button onclick="approve(currentPayrollId)" class="btn btn-approve" style="flex: 1;">Approve Payroll</button>
                <button onclick="reject(currentPayrollId)" class="btn btn-reject" style="flex: 1;">Reject</button>
                <button onclick="closeModal()" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js?v=4"></script>
    <script src="../js/sidebar.js?v=4"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        let currentPayrollId = null;
        
        async function loadApprovals() {
            try {
                // Load all payrolls and filter for PENDING_APPROVAL status
                const res = await auth.apiCall('/api/payroll/list?t=' + Date.now());
                const data = res && res.ok ? await res.json() : [];
                
                const tbody = document.getElementById('approvals-table');
                
                // Filter for PENDING_APPROVAL status only
                const pendingApprovals = data.filter(p => p.status === 'PENDING_APPROVAL');
                
                if (!pendingApprovals || pendingApprovals.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No pending approvals</td></tr>';
                    return;
                }
                
                tbody.innerHTML = pendingApprovals.map(a => `
                    <tr>
                        <td><strong>${a.employeeName || 'Unknown'}</strong><br><small>${a.designation || ''}</small></td>
                        <td>${a.month}/${a.year}</td>
                        <td><strong>${auth.formatCurrency(a.netSalary || 0)}</strong></td>
                        <td><span class="status-badge pending-approval">Pending Approval</span></td>
                        <td>
                            <button onclick="viewDetails(${a.id})" class="btn-small" style="background: #dbeafe; color: #1e40af;">View</button>
                            <button onclick="approve(${a.id})" class="btn-small" style="background: #dcfce7; color: #166534;">Approve</button>
                            <button onclick="reject(${a.id})" class="btn-small" style="background: #fee2e2; color: #991b1b;">Reject</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { 
                console.error(e);
                auth.showNotification('Failed to load approvals', 'error');
            }
        }
        
        function viewDetails(id) {
            currentPayrollId = id;
            // Load all payrolls and find the one with matching ID
            auth.apiCall('/api/payroll/list?t=' + Date.now()).then(res => {
                if (res && res.ok) return res.json();
                throw new Error('Failed to load payroll details');
            }).then(data => {
                const p = data.find(payroll => payroll.id === id);
                if (!p) throw new Error('Payroll not found');
                
                // Debug logging
                console.log('DEBUG Payroll data:', p);
                console.log('DEBUG - absentLeaveDeduction:', p.absentLeaveDeduction, 'otherDeductions:', p.otherDeductions);
                console.log('DEBUG - unpaidLeaveDays:', p.unpaidLeaveDays, 'absentDays:', p.absentDays, 'halfDays:', p.halfDays);
                console.log('DEBUG - totalDeductions:', p.totalDeductions, 'netSalary:', p.netSalary);
                
                const modal = document.getElementById('detail-modal');
                const content = document.getElementById('modal-content-body');
                const actionsDiv = document.querySelector('.modal-actions');
                
                // Check if still pending approval
                const isPendingApproval = p.status === 'PENDING_APPROVAL';
                
                // Update modal actions based on status
                if (actionsDiv) {
                    if (isPendingApproval) {
                        actionsDiv.innerHTML = `
                            <button onclick="approve(currentPayrollId)" class="btn btn-approve" style="flex: 1;">Approve Payroll</button>
                            <button onclick="reject(currentPayrollId)" class="btn btn-reject" style="flex: 1;">Reject</button>
                            <button onclick="closeModal()" class="btn btn-secondary">Close</button>
                        `;
                    } else {
                        actionsDiv.innerHTML = `
                            <div style="flex: 1; text-align: center; padding: 0.5rem; background: #f3f4f6; border-radius: 6px;">
                                <span style="font-weight: 600; color: #6b7280;">Status: ${p.status || 'Unknown'}</span>
                            </div>
                            <button onclick="closeModal()" class="btn btn-secondary">Close</button>
                        `;
                    }
                }
                
                content.innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-section">
                            <h4>Employee Information</h4>
                            <div class="detail-row"><span>Name:</span><strong>${p.employeeName || 'N/A'}</strong></div>
                            <div class="detail-row"><span>Department:</span><strong>${p.department || 'N/A'}</strong></div>
                            <div class="detail-row"><span>Designation:</span><strong>${p.designation || 'N/A'}</strong></div>
                            <div class="detail-row"><span>Period:</span><strong>${p.month}/${p.year}</strong></div>
                            <div class="detail-row"><span>Status:</span><span class="status-badge ${(p.status || 'PENDING').toLowerCase().replace('_', '-')}">${p.status || 'Pending'}</span></div>
                        </div>
                        
                        <div class="detail-section">
                            <h4>Attendance & Leave Summary</h4>
                            <div class="detail-row"><span>Present Days:</span><strong>${p.presentDays || 0}</strong></div>
                            <div class="detail-row"><span>Absent Days:</span><strong style="color: #dc2626;">${p.absentDays || 0}</strong></div>
                            <div class="detail-row"><span>Half Days:</span><strong>${p.halfDays || 0}</strong></div>
                            <div class="detail-row"><span>Paid Leave Days:</span><strong style="color: #16a34a;">${p.paidLeaveDays || 0}</strong></div>
                            <div class="detail-row"><span>Unpaid Leave Days:</span><strong style="color: #dc2626;">${p.unpaidLeaveDays || 0}</strong></div>
                        </div>
                        
                        <div class="detail-section" style="background: #f0fdf4; border: 1px solid #86efac;">
                            <h4 style="color: #166534;">💰 Paid Leave Balance</h4>
                            <div class="detail-row"><span>Total Earned:</span><strong>${p.leaveBalance ? (p.leaveBalance.totalEarnedLeaves || 0).toFixed(1) : '0.0'}</strong></div>
                            <div class="detail-row"><span>Used:</span><strong style="color: #d97706;">${p.leaveBalance ? (p.leaveBalance.usedLeaves || 0).toFixed(1) : '0.0'}</strong></div>
                            <div class="detail-row"><span>Remaining:</span><strong style="color: #16a34a;">${p.leaveBalance ? (p.leaveBalance.availableLeaves || 0).toFixed(1) : '0.0'}</strong></div>
                            <div class="detail-row"><span>Probation:</span><strong>${p.probationStatus || 'N/A'}</strong></div>
                        </div>
                        
                        <div class="detail-section earnings">
                            <h4>Earnings</h4>
                            <div class="detail-row"><span>Basic Salary:</span><span>${auth.formatCurrency(p.basicSalary || 0)}</span></div>
                            <div class="detail-row"><span>HRA:</span><span>${auth.formatCurrency(p.hra || 0)}</span></div>
                            <div class="detail-row"><span>DA:</span><span>${auth.formatCurrency(p.da || 0)}</span></div>
                            <div class="detail-row"><span>TA:</span><span>${auth.formatCurrency(p.ta || 0)}</span></div>
                            <div class="detail-row"><span>Other Allowances:</span><span>${auth.formatCurrency(p.otherAllowances || 0)}</span></div>
                            <div class="detail-row total"><span>Gross Salary:</span><strong>${auth.formatCurrency(p.grossSalary || 0)}</strong></div>
                        </div>
                        
                        <div class="detail-section deductions">
                            <h4 style="color: #991b1b;">➖ Deductions Breakdown</h4>
                            <div style="background: #fef2f2; padding: 0.75rem; border-radius: 6px; margin-bottom: 0.75rem;">
                                <h5 style="margin: 0 0 0.5rem 0; font-size: 0.875rem; color: #7f1d1d;">Statutory Deductions</h5>
                                <div class="detail-row"><span>Provident Fund (PF):</span><span style="color: #dc2626;">-${auth.formatCurrency(p.providentFund || p.pf || 0)}</span></div>
                                <div class="detail-row"><span>Professional Tax:</span><span style="color: #dc2626;">-${auth.formatCurrency(p.tax || p.incomeTax || 0)}</span></div>
                                <div class="detail-row"><span>Insurance:</span><span style="color: #dc2626;">-${auth.formatCurrency(p.insurance || p.otherDeduction || 0)}</span></div>
                            </div>
                            <div style="background: #fef2f2; padding: 0.75rem; border-radius: 6px; margin-bottom: 0.75rem;">
                                <h5 style="margin: 0 0 0.5rem 0; font-size: 0.875rem; color: #7f1d1d;">Attendance & Leave Deductions</h5>
                                ${(() => {
                                    const dailyRate = p.basicSalary ? p.basicSalary / 26 : 0;
                                    const absentDeduction = (p.absentDays || 0) * dailyRate;
                                    const unpaidDeduction = (p.unpaidLeaveDays || 0) * dailyRate;
                                    const halfDayDeduction = ((p.halfDays || 0) * dailyRate * 0.5);
                                    let html = '';
                                    if ((p.absentDays || 0) > 0) {
                                        html += `<div class="detail-row"><span>Absent Days (${p.absentDays} days):</span><span style="color: #dc2626;">-${auth.formatCurrency(absentDeduction)}</span></div>`;
                                    }
                                    if ((p.unpaidLeaveDays || 0) > 0) {
                                        html += `<div class="detail-row"><span>Unpaid Leaves (${p.unpaidLeaveDays} days):</span><span style="color: #dc2626;">-${auth.formatCurrency(unpaidDeduction)}</span></div>`;
                                    }
                                    if ((p.halfDays || 0) > 0) {
                                        html += `<div class="detail-row"><span>Half Days (${p.halfDays} × 0.5):</span><span style="color: #dc2626;">-${auth.formatCurrency(halfDayDeduction)}</span></div>`;
                                    }
                                    const totalAttendanceDeduction = p.absentLeaveDeduction || (absentDeduction + unpaidDeduction + halfDayDeduction) || 0;
                                    if (absentDeduction === 0 && unpaidDeduction === 0 && halfDayDeduction === 0) {
                                        html += '<div style="color: #059669; font-size: 0.875rem;">✓ No attendance deductions</div>';
                                    }
                                    html += `<div class="detail-row" style="border-top: 1px solid #fca5a5; margin-top: 0.5rem; padding-top: 0.5rem;"><span><strong>Total Attendance Deduction:</strong></span><strong style="color: #dc2626;">-${auth.formatCurrency(totalAttendanceDeduction)}</strong></div>`;
                                    return html;
                                })()}
                            </div>
                            <div class="detail-row total" style="background: #fee2e2; padding: 0.5rem; border-radius: 6px;"><span>Total Deductions:</span><strong style="color: #dc2626;">-${auth.formatCurrency(p.totalDeductions || p.totalDeduction || 0)}</strong></div>
                        </div>
                        
                        <div class="detail-section net-salary">
                            <h4>Net Salary</h4>
                            <div class="net-amount">${auth.formatCurrency(p.netSalary || 0)}</div>
                        </div>
                    </div>
                `;
                
                modal.style.display = 'flex';
            }).catch(e => {
                console.error(e);
                auth.showNotification('Failed to load payroll details', 'error');
            });
        }
        
        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
            currentPayrollId = null;
        }
        
        async function approve(id) {
            if (!confirm('Are you sure you want to approve this payroll?')) return;

            try {
                const res = await auth.apiCall(`/api/payroll/approve/${id}`, {
                    method: 'POST',
                    body: JSON.stringify({ accountantName: 'Accountant' })
                });
                if (res && res.ok) {
                    auth.showNotification('Payroll approved successfully', 'success');
                    loadApprovals();
                    closeModal();
                } else {
                    const errorText = await res.text();
                    auth.showNotification('Error: ' + (errorText || 'Failed to approve payroll'), 'error');
                }
            } catch (e) {
                auth.showNotification('Error: ' + e.message, 'error');
            }
        }
        
        async function reject(id) {
            const reason = prompt('Enter rejection reason:');
            if (!reason) return;
            
            try {
                const res = await auth.apiCall(`/api/payroll/reject/${id}`, {
                    method: 'POST',
                    body: JSON.stringify({ reason: reason })
                });
                if (res && res.ok) {
                    auth.showNotification('Payroll rejected', 'success');
                    loadApprovals();
                    closeModal();
                }
            } catch (e) { 
                auth.showNotification(e.message, 'error'); 
            }
        }
        
        function logout() { auth.logout(); }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('detail-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        loadApprovals();
    </script>
    <style>
        .badge-warning { background: #fef3c7; color: #92400e; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .status-badge.pending-approval { background: #fef3c7; color: #92400e; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { background: white; border-radius: 12px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #e5e7eb; }
        .modal-header h2 { margin: 0; font-size: 1.25rem; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6b7280; }
        .close-btn:hover { color: #374151; }
        
        .detail-grid { padding: 1.5rem; display: grid; gap: 1.5rem; }
        .detail-section { background: #f9fafb; padding: 1rem; border-radius: 8px; }
        .detail-section h4 { margin: 0 0 0.75rem 0; font-size: 0.875rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-row { display: flex; justify-content: space-between; padding: 0.375rem 0; font-size: 0.875rem; }
        .detail-row.total { border-top: 1px solid #d1d5db; margin-top: 0.5rem; padding-top: 0.5rem; font-size: 1rem; }
        .detail-section.earnings { background: #f0fdf4; border: 1px solid #86efac; }
        .detail-section.deductions { background: #fef2f2; border: 1px solid #fca5a5; }
        .detail-section.net-salary { background: #eff6ff; border: 1px solid #93c5fd; text-align: center; }
        .net-amount { font-size: 1.75rem; font-weight: 700; color: #1e40af; }
        
        .modal-actions { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; border-top: 1px solid #e5e7eb; background: #f9fafb; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; }
        .btn-approve { background: #dcfce7; color: #166534; }
        .btn-approve:hover { background: #bbf7d0; }
        .btn-reject { background: #fee2e2; color: #991b1b; }
        .btn-reject:hover { background: #fecaca; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
    </style>
</body>
</html>
