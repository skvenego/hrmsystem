<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance - HRM System</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1>My Attendance</h1>
                <div class="header-actions">
                    <select id="month-filter" class="search-input">
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5">June</option>
                        <option value="6">July</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December</option>
                    </select>
                    <select id="year-filter" class="search-input">
                        <option value="2024">2024</option>
                        <option value="2025" selected>2025</option>
                    </select>
                </div>
            </header>

            <div class="page-content">
                <!-- Summary Cards -->
                <div class="stats-grid" style="margin-bottom: 1.5rem;">
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="m9 16 2 2 4-4"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="present-days">0</h3>
                            <p>Present Days</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="9" x2="15" y1="12" y2="12"></line>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="absent-days">0</h3>
                            <p>Absent Days</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="M16 2v4M8 2v4M3 10h18"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="leave-days">0</h3>
                            <p>Leave Days</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="working-hours">0</h3>
                            <p>Total Hours</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Attendance Records</h3>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Date</th><th>Status</th><th>Check In</th><th>Check Out</th><th>Working Hours</th></tr>
                            </thead>
                            <tbody id="attendance-table">
                                <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        const user = auth.getCurrentUser();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        
        // Set current month
        document.getElementById('month-filter').value = new Date().getMonth();
        
        async function loadMyAttendance() {
            const month = parseInt(document.getElementById('month-filter').value) + 1;
            const year = parseInt(document.getElementById('year-filter').value);
            
            try {
                const res = await auth.apiCall(`/api/attendance/my?month=${month}&year=${year}`);
                const data = res && res.ok ? await res.json() : [];
                
                // Calculate summary
                let present = 0, absent = 0, leave = 0, hours = 0;
                data.forEach(a => {
                    if (a.status === 'PRESENT') present++;
                    else if (a.status === 'ABSENT') absent++;
                    else if (a.status === 'LEAVE') leave++;
                    hours += a.workingHours || 0;
                });
                
                document.getElementById('present-days').textContent = present;
                document.getElementById('absent-days').textContent = absent;
                document.getElementById('leave-days').textContent = leave;
                document.getElementById('working-hours').textContent = hours.toFixed(1);
                
                // Render table
                const tbody = document.getElementById('attendance-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No attendance records found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td>${auth.formatDate(a.date)}</td>
                        <td><span class="status-badge ${a.status?.toLowerCase()}">${a.status || 'N/A'}</span></td>
                        <td>${a.checkInTime || '-'}</td>
                        <td>${a.checkOutTime || '-'}</td>
                        <td>${a.workingHours ? a.workingHours.toFixed(2) : '-'} hrs</td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        
        document.getElementById('month-filter').addEventListener('change', loadMyAttendance);
        document.getElementById('year-filter').addEventListener('change', loadMyAttendance);
        
        loadMyAttendance();
    </script>
</body>
</html>
