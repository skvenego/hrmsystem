<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Payslips - HRM System</title>
    <link rel="stylesheet" href="../css/hrm-design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header flex justify-between items-center mb-6">
                <div class="page-title">
                    <h1>My Payslips</h1>
                    <p>View and download your salary statements</p>
                </div>
                <div class="flex gap-2 items-center">
                    <select id="monthFilter" class="form-control" onchange="filterByMonth()" style="width: auto;">
                        <option value="">All Months</option>
                    </select>
                    <button onclick="loadCurrentMonthPayslip()" class="btn-primary">Current Month</button>
                    <button onclick="loadMyPayslips()" class="btn-icon" title="Refresh">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div id="payslips-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Payslip cards -->
                </div>
            </div>
        </main>
    </div>

    <!-- Payslip Detail Modal -->
    <div id="payslip-modal" class="modal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header border-b">
                <h3 class="modal-title">Payslip Details</h3>
                <button onclick="closeModal()" class="btn-icon">&times;</button>
            </div>
            <div class="modal-body" id="payslip-detail-content">
                <!-- Payslip details will be loaded here -->
            </div>
        </div>
    </div>
    </main>
    </div>

    <script src="../js/auth.js?v=5"></script>
    <script src="../js/sidebar.js?v=5"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');

        // Render sidebar explicitly
        renderSidebar();

        const user = auth.getCurrentUser();

        let allPayslips = []; // Store all payslips for filtering

        function getCurrentMonthYear() {
            const now = new Date();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            return `${monthNames[now.getMonth()]} ${now.getFullYear()}`;
        }

        function populateMonthFilter(payslips) {
            const monthFilter = document.getElementById('monthFilter');
            const months = [...new Set(payslips.map(p => p.monthYear).filter(m => m))].sort().reverse();

            monthFilter.innerHTML = '<option value="">All Months</option>';
            months.forEach(month => {
                monthFilter.innerHTML += `<option value="${month}">${month}</option>`;
            });

            // Select current month by default
            const currentMonth = getCurrentMonthYear();
            if (months.includes(currentMonth)) {
                monthFilter.value = currentMonth;
            }
        }

        function filterByMonth() {
            const selectedMonth = document.getElementById('monthFilter').value;
            displayPayslips(allPayslips, selectedMonth);
        }

        function loadCurrentMonthPayslip() {
            const currentMonth = getCurrentMonthYear();
            document.getElementById('monthFilter').value = currentMonth;
            displayPayslips(allPayslips, currentMonth);
        }

        function displayPayslips(data, filterMonth = '') {
            const grid = document.getElementById('payslips-grid');

            // Only show APPROVED or SENT payslips
            let visiblePayslips = data.filter(p => {
                const status = (p.status || '').toUpperCase();
                return status === 'APPROVED' || status === 'SENT' || status === 'PAID';
            });

            // Filter by selected month if specified
            if (filterMonth) {
                visiblePayslips = visiblePayslips.filter(p => p.monthYear === filterMonth);
            }

            if (visiblePayslips.length === 0) {
                const message = filterMonth
                    ? `No payslip available for ${filterMonth}. Select a different month or check back later.`
                    : 'No payslips available yet. Payslips will appear here after approval.';
                grid.innerHTML = `<div style="text-align: center; padding: 4rem; color: var(--gray-500);">${message}</div>`;
                return;
            }

            // Show only the first payslip (single month view)
            const p = visiblePayslips[0];
            const status = (p.status || '').toUpperCase();
            const statusClass = status.toLowerCase() || 'pending';
            const statusLabel = status === 'SENT' ? '✓ Sent' : (status === 'PAID' ? '✓ Paid' : (status === 'APPROVED' ? 'Approved' : p.status));

            grid.innerHTML = `
                <div class="card p-0 overflow-hidden">
                    <div class="p-4 border-b bg-gray-50 flex items-center gap-3">
                        <div class="avatar avatar-md bg-primary text-white">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg mb-0">${p.monthYear || 'N/A'}</h4>
                            <div class="text-xs text-muted">${p.employeeName || ''}</div>
                        </div>
                        <span class="status-badge ${statusClass}">${statusLabel}</span>
                    </div>
                    <div class="p-5 space-y-4">
                        <div class="flex justify-between items-center pb-3 border-b">
                            <span class="text-sm text-muted">Net Salary</span>
                            <span class="font-bold text-2xl text-success">${auth.formatCurrency(p.netSalary || 0)}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-3 bg-gray-50 rounded-lg">
                                <div class="text-[10px] text-muted uppercase font-bold mb-1">Basic Salary</div>
                                <div class="text-sm font-semibold">${auth.formatCurrency(p.basicSalary || 0)}</div>
                            </div>
                            <div class="p-3 bg-gray-50 rounded-lg">
                                <div class="text-[10px] text-muted uppercase font-bold mb-1">Allowances</div>
                                <div class="text-sm font-semibold">${auth.formatCurrency((p.da || 0) + (p.hra || 0) + (p.otherAllowance || 0))}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 text-xs text-muted">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            Leave Balance: <span class="font-bold text-success ml-1">${p.leaveBalance && typeof p.leaveBalance.availableLeaves === 'number' ? p.leaveBalance.availableLeaves.toFixed(1) : '0.0'}</span>
                        </div>
                        ${p.remarks ? `<div class="p-3 bg-blue-50 border-l-4 border-blue-500 text-xs text-blue-700 italic">${p.remarks}</div>` : ''}
                    </div>
                    <div class="p-4 bg-gray-50 border-t flex gap-3">
                        <button onclick="downloadPayslip(${p.id})" class="btn-primary flex-1 flex items-center justify-center gap-2">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            Download PDF
                        </button>
                        <button onclick="viewPayslipDetails(${p.id})" class="btn-secondary flex-1 flex items-center justify-center gap-2">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            View Details
                        </button>
                    </div>
                </div>
            `;
        }

        async function loadMyPayslips() {
            try {
                console.log('Loading my payslips...');
                const res = await auth.apiCall('/api/payslips/my?t=' + Date.now());
                const data = res && res.ok ? await res.json() : [];

                console.log('Payslips API response:', data);
                console.log('Number of payslips returned:', data.length);

                allPayslips = data || [];

                if (allPayslips.length === 0) {
                    console.log('No payslips data returned');
                    document.getElementById('payslips-grid').innerHTML = '<div style="text-align: center; padding: 4rem; color: var(--gray-500);">No payslips found. Payslips will appear here after your payroll is approved and paid.</div>';
                    return;
                }

                // Populate month filter dropdown
                populateMonthFilter(allPayslips);

                // Display payslips (filtered by current month if available)
                const selectedMonth = document.getElementById('monthFilter').value;
                displayPayslips(allPayslips, selectedMonth);

            } catch (e) {
                console.error(e);
                auth.showNotification('Failed to load payslips', 'error');
            }
        }

        function viewPayslipDetails(id) {
            console.log('Viewing payslip details for ID:', id);
            if (!id) {
                auth.showNotification('Invalid payslip ID', 'error');
                return;
            }
            // Find payslip in loaded data and show modal
            auth.apiCall(`/api/payslips/${id}`).then(res => {
                console.log('API response:', res);
                if (res && res.ok) {
                    return res.json();
                }
                throw new Error('Failed to load payslip details: ' + (res ? res.status : 'no response'));
            }).then(p => {
                console.log('Payslip data:', p);
                const modal = document.getElementById('payslip-modal');
                const content = document.getElementById('payslip-detail-content');

                const pStatus = (p.status || '').toUpperCase();
                const statusLabel = pStatus === 'SENT' ? '✓ Sent to Employee' : (pStatus === 'PAID' ? '✓ Paid & Processed' : (pStatus === 'APPROVED' ? '✓ Approved by HR & Accountants' : p.status));
                const approvalNote = p.remarks || 'Approved by HR and Accountants';

                content.innerHTML = `
                    <div class="payslip-detail">
                        <!-- Employee Details Section -->
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
                            <h4 style="margin: 0 0 1rem 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 0.5rem;">👤 Employee Details</h4>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Name</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.employeeName || 'Unknown'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Employee ID</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.employeeId || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Department</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.department || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Designation</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.designation || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Email</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.email || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Phone</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.phone || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Join Date</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.joinDate ? auth.formatDate(p.joinDate) : '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Basic Salary</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${auth.formatCurrency(p.basicSalary || 0)}</p>
                                </div>
                            </div>
                        </div>

                        <div class="payslip-company-header" style="text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #e5e7eb;">
                            <h3 style="margin: 0; font-size: 1.5rem;">PAYSLIP</h3>
                            <p style="margin: 0.25rem 0; color: #6b7280;">${p.monthYear || 'N/A'}</p>
                        </div>
                        
                        <div class="status-section" style="background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; text-align: center;">
                            <p style="margin: 0; font-weight: 600; color: #166534;">${statusLabel}</p>
                            <p style="margin: 0.25rem 0 0 0; font-size: 0.875rem; color: #22c55e;">${approvalNote}</p>
                            ${p.approvedBy ? `<p style="margin: 0.25rem 0 0 0; font-size: 0.75rem; color: #6b7280;">Approved by: ${p.approvedBy}</p>` : ''}
                            ${p.approvedDate ? `<p style="margin: 0; font-size: 0.75rem; color: #6b7280;">Date: ${auth.formatDate(p.approvedDate)}</p>` : ''}
                        </div>
                        
                        <div class="attendance-section" style="margin-bottom: 1rem;">
                            <h4 style="margin: 0 0 0.5rem 0; font-size: 1rem; color: #374151;">📊 Attendance & Leave Summary</h4>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; background: #f9fafb; padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem;">
                                <div class="att-item" style="text-align: center;"><span style="color: #6b7280; font-size: 0.75rem;">Present Days</span> <br><strong style="color: #059669; font-size: 1.25rem;">${(p.presentDays || 0).toFixed(1)}</strong></div>
                                <div class="att-item" style="text-align: center;"><span style="color: #6b7280; font-size: 0.75rem;">Absent Days</span> <br><strong style="color: #dc2626; font-size: 1.25rem;">${(p.absentDays || 0).toFixed(1)}</strong></div>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; background: #f9fafb; padding: 0.75rem; border-radius: 8px;">
                                <div class="att-item" style="text-align: center; background: #f0fdf4; padding: 0.5rem; border-radius: 6px;"><span style="color: #6b7280; font-size: 0.75rem;">Paid used</span> <br><strong style="color: #16a34a; font-size: 1.25rem;">${(p.paidLeaveDays || 0).toFixed(1)}</strong></div>
                                <div class="att-item" style="text-align: center; background: #fef2f2; padding: 0.5rem; border-radius: 6px;"><span style="color: #6b7280; font-size: 0.75rem;">Unpaid used</span> <br><strong style="color: #dc2626; font-size: 1.25rem;">${(p.unpaidLeaveDays || 0).toFixed(1)}</strong></div>
                            </div>
                        </div>
                        
                        <div class="earnings-section" style="margin-bottom: 1rem;">
                            <h4 style="margin: 0 0 0.5rem 0; font-size: 1rem; color: #374151;">Earnings</h4>
                            <div style="background: #f0fdf4; padding: 0.75rem; border-radius: 8px;">
                                <div class="payslip-row"><span>Basic Salary</span><span>${auth.formatCurrency(p.basicSalary || 0)}</span></div>
                                <div class="payslip-row"><span>HRA</span><span>${auth.formatCurrency(p.hra || 0)}</span></div>
                                <div class="payslip-row"><span>DA</span><span>${auth.formatCurrency(p.da || 0)}</span></div>
                                <div class="payslip-row"><span>Other Allowance</span><span>${auth.formatCurrency(p.otherAllowance || 0)}</span></div>
                                <div class="payslip-row" style="border-top: 1px solid #86efac; margin-top: 0.5rem; padding-top: 0.5rem;">
                                    <span><strong>Gross Salary</strong></span>
                                    <strong style="color: #16a34a;">${auth.formatCurrency(p.grossSalary || 0)}</strong>
                                </div>
                            </div>
                        </div>
                              <div class="deductions-section" style="margin-bottom: 1rem;">
                            <h4 style="margin: 0 0 0.5rem 0; font-size: 1rem; color: #374151;">Deductions</h4>
                            <div style="background: #fef2f2; padding: 0.75rem; border-radius: 8px;">
                                <div class="payslip-row"><span>Provident Fund (PF)</span><span style="color: #dc2626;">-${auth.formatCurrency(p.providentFund || p.pf || 0)}</span></div>
                                <div class="payslip-row"><span>Income Tax</span><span style="color: #dc2626;">-${auth.formatCurrency(p.tax || p.incomeTax || 0)}</span></div>
                                <div class="payslip-row"><span>Insurance</span><span style="color: #dc2626;">-${auth.formatCurrency(p.insurance || 0)}</span></div>
                                ${(() => {
                                    // ✅ Compute attendance deductions on-the-fly
                                    const gross = p.grossSalary || 0;
                                    const dailyRate = gross > 0 ? gross / 26 : 0;
                                    const unpaidDed = (dailyRate * (p.unpaidLeaveDays || 0));
                                    const absentDed = (dailyRate * (p.absentDays || 0));
                                    const totalAttDed = unpaidDed + absentDed;
                                    if (totalAttDed <= 0) return '';
                                    let html = '';
                                    if ((p.unpaidLeaveDays || 0) > 0)
                                        html += `<div class="payslip-row"><span>Unpaid Leave (${p.unpaidLeaveDays} days)</span><span style="color:#dc2626;">-${auth.formatCurrency(unpaidDed)}</span></div>`;
                                    if ((p.absentDays || 0) > 0)
                                        html += `<div class="payslip-row"><span>Absent Penalty (${p.absentDays} days)</span><span style="color:#dc2626;">-${auth.formatCurrency(absentDed)}</span></div>`;
                                    return html;
                                })()}
                                <div class="payslip-row" style="border-top: 1px solid #fca5a5; margin-top: 0.5rem; padding-top: 0.5rem;">
                                    <span><strong>Total Deductions</strong></span>
                                    <strong style="color: #dc2626;">-${auth.formatCurrency(p.totalDeduction || 0)}</strong>
                                </div>
                            </div>
                        </div>
           </div >
                        
                        <div class="net-section" style="background: #eff6ff; padding: 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem;">
                            <p style="margin: 0; color: #6b7280; font-size: 0.875rem;">Net Salary</p>
                            <p style="margin: 0.25rem 0; font-size: 1.5rem; font-weight: 700; color: #1e40af;">${auth.formatCurrency(p.netSalary || 0)}</p>
                        </div>
                        
                        <div class="approval-footer" style="text-align: center; padding-top: 1rem; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 0.875rem; color: #6b7280; font-style: italic;">This is a computer-generated payslip and does not require signature.</p>
                            <p style="margin: 0.25rem 0 0 0; font-size: 0.75rem; color: #9ca3af;">${approvalNote}</p>
                        </div>
                    </div >

                <div class="modal-actions" style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                    <button onclick="downloadPayslip(${p.id})" class="btn btn-primary" style="flex: 1;">Download PDF</button>
                    <button onclick="closeModal()" class="btn btn-secondary">Close</button>
                </div>
                `;
                
                modal.style.display = 'flex';
            }).catch(e => {
                console.error('Error loading payslip details:', e);
                auth.showNotification('Failed to load payslip details: ' + e.message, 'error');
            });
        }
        
        function closeModal() {
            document.getElementById('payslip-modal').style.display = 'none';
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('payslip-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        loadMyPayslips();
        
        function downloadPayslip(id) {
            const token = auth.getAuth().token;
            window.open(`/api/payslips/${id}/download-pdf?token=${token}`, '_blank');
        }
        
        // Replaced by viewPayslipDetails for detailed modal view
        
        loadMyPayslips();
    </script>
</body>

</html>
