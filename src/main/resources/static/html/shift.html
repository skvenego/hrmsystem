<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Management - HRM System</title>
    <link rel="stylesheet" href="../css/hrm-design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header flex justify-between items-center mb-6">
                <div class="page-title">
                    <h1>Shift Management</h1>
                    <p>Define and manage office timings and shifts</p>
                </div>
                <div class="flex gap-2 items-center">
                    <button id="add-shift-btn" class="btn-primary flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
                        Add New Shift
                    </button>
                </div>
            </header>

            <div class="page-content">
                <!-- Stats Row -->
                <div class="stats-grid mb-6">
                    <div class="stat-card">
                        <div class="stat-icon-wrapper primary">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">Total Shifts</span>
                            <span class="stat-value" id="stat-total">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper success">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">Active Shifts</span>
                            <span class="stat-value" id="stat-active">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper warning">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">Default Shift</span>
                            <span class="stat-value text-sm" id="stat-default">None</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Shift List</h2>
                </div>

                <!-- Shift Cards Grid -->
                <div id="shifts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="col-span-full text-center p-8 text-muted">Loading shifts...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Shift Modal -->
    <div id="shift-modal" class="modal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header border-b">
                <h3 class="modal-title" id="modal-title">Add Shift</h3>
                <button onclick="closeModal()" class="btn-icon">&times;</button>
            </div>
            <div class="modal-body">
                <form id="shift-form">
                    <input type="hidden" name="id" id="shift-id">
                    <div class="form-group mb-4">
                        <label class="form-label">Shift Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="shift-name" class="form-control" required placeholder="e.g. Day Shift, Night Shift">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="form-group">
                            <label class="form-label">Start Time <span class="text-danger">*</span></label>
                            <input type="time" name="startTime" id="start-time" class="form-control" required onchange="calculateHours()">
                        </div>
                        <div class="form-group">
                            <label class="form-label">End Time <span class="text-danger">*</span></label>
                            <input type="time" name="endTime" id="end-time" class="form-control" required onchange="calculateHours()">
                        </div>
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Working Hours</label>
                        <input type="number" name="workingHours" id="working-hours" class="form-control" step="0.5" readonly placeholder="Calculated automatically">
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Description</label>
                        <textarea name="description" id="shift-desc" class="form-control" rows="2" placeholder="Optional details..."></textarea>
                    </div>
                    <div class="flex items-center gap-4 mb-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="active" id="shift-active" checked>
                            <span class="text-sm">Active</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="isDefault" id="shift-default-check">
                            <span class="text-sm">Set as Default</span>
                        </label>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Save Shift</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) window.location.href = 'login.html';

        async function loadShifts() {
            try {
                const res = await auth.apiCall('/api/shifts/active');
                if (!res || !res.ok) throw new Error('Failed to load shifts');
                
                const data = await res.json();
                
                // Update Stats
                document.getElementById('stat-total').textContent = data.length;
                document.getElementById('stat-active').textContent = data.filter(s => s.active).length;
                const defaultShift = data.find(s => s.isDefault);
                document.getElementById('stat-default').textContent = defaultShift ? defaultShift.name : 'None';

                const grid = document.getElementById('shifts-grid');
                if (data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center p-8 text-muted card">No shifts defined yet. Click "Add New Shift" to get started.</div>';
                    return;
                }

                grid.innerHTML = data.map(s => `
                    <div class="card p-4 relative border-t-4 ${s.active ? (s.isDefault ? 'border-primary' : 'border-success') : 'border-gray-300'}">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-lg mb-1 flex items-center gap-2">
                                    ${s.name}
                                    ${s.isDefault ? '<span class="badge badge-primary text-[10px] uppercase">Default</span>' : ''}
                                </h3>
                                <div class="flex items-center gap-2 text-primary font-medium">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    ${s.startTime.substring(0, 5)} - ${s.endTime.substring(0, 5)}
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editShift(${s.id})" class="btn-icon sm" title="Edit">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                </button>
                                <button onclick="deleteShift(${s.id})" class="btn-icon sm text-danger" title="Delete">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div class="text-sm text-muted mb-4">${s.description || 'No description provided.'}</div>
                        <div class="flex justify-between items-center pt-3 border-t">
                            <div class="text-xs font-bold uppercase text-muted">Working Hours</div>
                            <div class="text-lg font-bold text-gray-800">${s.workingHours} hrs</div>
                        </div>
                        ${!s.isDefault && s.active ? `
                            <button onclick="setDefault(${s.id})" class="btn-secondary btn-mini w-full mt-4">Set as Default</button>
                        ` : ''}
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                auth.showNotification('Error loading shifts', 'error');
            }
        }

        function calculateHours() {
            const start = document.getElementById('start-time').value;
            const end = document.getElementById('end-time').value;
            if (!start || !end) return;

            const [sH, sM] = start.split(':').map(Number);
            const [eH, eM] = end.split(':').map(Number);
            
            let diff = (eH * 60 + eM) - (sH * 60 + sM);
            if (diff < 0) diff += 24 * 60; // Handle overnight shift
            
            document.getElementById('working-hours').value = (diff / 60).toFixed(1);
        }

        function openModal(isEdit = false) {
            document.getElementById('modal-title').textContent = isEdit ? 'Edit Shift' : 'Add New Shift';
            document.getElementById('shift-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('shift-modal').classList.remove('active');
            document.getElementById('shift-form').reset();
            document.getElementById('shift-id').value = '';
        }

        document.getElementById('add-shift-btn').onclick = () => openModal();

        document.getElementById('shift-form').onsubmit = async (e) => {
            e.preventDefault();
            calculateHours(); // Ensure working hours is calculated
            const id = document.getElementById('shift-id').value;
            const data = {
                name: document.getElementById('shift-name').value,
                startTime: document.getElementById('start-time').value + ':00',
                endTime: document.getElementById('end-time').value + ':00',
                workingHours: parseFloat(document.getElementById('working-hours').value),
                description: document.getElementById('shift-desc').value,
                active: document.getElementById('shift-active').checked,
                isDefault: document.getElementById('shift-default-check').checked
            };

            try {
                const res = await auth.apiCall(id ? `/api/shifts/${id}` : '/api/shifts', {
                    method: id ? 'PUT' : 'POST',
                    body: JSON.stringify(data)
                });
                if (res && res.ok) {
                    auth.showNotification(`Shift ${id ? 'updated' : 'created'} successfully`, 'success');
                    closeModal();
                    loadShifts();
                }
            } catch (e) {
                auth.showNotification(e.message, 'error');
            }
        };

        async function editShift(id) {
            try {
                const res = await auth.apiCall(`/api/shifts/${id}`);
                const s = await res.json();
                document.getElementById('shift-id').value = s.id;
                document.getElementById('shift-name').value = s.name;
                document.getElementById('start-time').value = s.startTime.substring(0, 5);
                document.getElementById('end-time').value = s.endTime.substring(0, 5);
                document.getElementById('working-hours').value = s.workingHours;
                document.getElementById('shift-desc').value = s.description || '';
                document.getElementById('shift-active').checked = s.active;
                document.getElementById('shift-default-check').checked = s.isDefault;
                openModal(true);
            } catch (e) { auth.showNotification('Error fetching shift', 'error'); }
        }

        async function deleteShift(id) {
            if (!confirm('Are you sure? Employees assigned to this shift might be affected.')) return;
            try {
                const res = await auth.apiCall(`/api/shifts/${id}`, { method: 'DELETE' });
                if (res && res.ok) {
                    auth.showNotification('Shift deleted', 'success');
                    loadShifts();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }

        async function setDefault(id) {
            try {
                const res = await auth.apiCall(`/api/shifts/${id}/set-default`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification('Default shift updated', 'success');
                    loadShifts();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }

        loadShifts();
    </script>
</body>
</html>
