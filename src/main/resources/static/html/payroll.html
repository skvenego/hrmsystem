        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1>Payroll Management</h1>
                <div class="header-actions">
                    <select id="month-filter" class="search-input" style="width: auto;">
                        <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                        <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                        <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                        <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                    </select>
                    <select id="year-filter" class="search-input" style="width: auto;">
                        <option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option>
                    </select>
                    <button onclick="generatePayroll()" class="btn-primary">Generate Payroll</button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Month</th><th>Basic</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="payroll-table">
                                <tr><td colspan="8" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        
        async function loadPayroll() {
            try {
                const res = await auth.apiCall('/api/payroll/list?t=' + Date.now());
                const data = res && res.ok ? await res.json() : [];
                
                const tbody = document.getElementById('payroll-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 2rem;">No payroll records</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.employeeName || 'Unknown'}</td>
                        <td>${monthNames[p.month-1]} ${p.year}</td>
                        <td>${auth.formatCurrency(p.basicSalary || 0)}</td>
                        <td>${auth.formatCurrency(p.grossSalary || 0)}</td>
                        <td>${auth.formatCurrency(p.totalDeductions || 0)}</td>
                        <td><strong>${auth.formatCurrency(p.netSalary || 0)}</strong></td>
                        <td><span class="status-badge ${(p.status || 'PENDING').toLowerCase()}">${p.status || 'PENDING'}</span></td>
                        <td>
                            ${p.status === 'PENDING' ? `<button onclick="processPayroll(${p.id})" class="btn-small">Process</button>` : ''}
                            ${p.status === 'PROCESSED' ? `<button onclick="payPayroll(${p.id})" class="btn-small" style="background: #dcfce7; color: #166534;">Pay</button>` : ''}
                            <button onclick="viewPayslip(${p.id})" class="btn-small">View</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        
        async function generatePayroll() {
            const month = document.getElementById('month-filter').value;
            const year = document.getElementById('year-filter').value;
            try {
                const res = await auth.apiCall('/api/payroll/generate-all', {
                    method: 'POST',
                    body: JSON.stringify({ month: parseInt(month), year: parseInt(year) })
                });
                if (res && res.ok) {
                    auth.showNotification('Payroll generated', 'success');
                    loadPayroll();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        async function processPayroll(id) {
            try {
                const res = await auth.apiCall(`/api/payroll/process/${id}`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification('Payroll processed', 'success');
                    loadPayroll();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        async function payPayroll(id) {
            try {
                const res = await auth.apiCall(`/api/payroll/pay/${id}`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification('Payroll paid', 'success');
                    loadPayroll();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        function viewPayslip(id) {
            window.open(`/api/payslips/${id}/download`, '_blank');
        }
        
        function logout() { auth.logout(); }
        
        document.getElementById('month-filter').value = new Date().getMonth() + 1;
        loadPayroll();
    </script>
</body>
</html>
