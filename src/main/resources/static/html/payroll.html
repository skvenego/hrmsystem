<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll - HRM System</title>
    <link rel="stylesheet" href="../css/hrm-design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header flex justify-between items-center mb-6">
                <div class="page-title">
                    <h1>Payroll Management</h1>
                    <p>Process salaries and manage employee compensation</p>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button onclick="history.back()" class="icon-btn" title="Go Back">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                    </button>
                </div>
                <div class="header-actions">
                    <select id="month-filter" class="search-input" style="width: auto;">
                        <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                        <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                        <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                        <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                    </select>
                    <select id="year-filter" class="search-input" style="width: auto;">
                        <option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option>
                    </select>
                    <button onclick="clearAllPayrolls()" class="btn-danger" style="margin-right: 0.5rem;">Clear All Payroll</button>
                    <button onclick="generatePayroll()" class="btn-primary">Generate Payroll</button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Month</th><th>Basic</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="payroll-table">
                                <tr><td colspan="8" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Payslip Detail Modal -->
    <div id="payslip-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; padding: 1rem;">
        <div class="modal-content" style="background: white; border-radius: 12px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #e5e7eb;">
                <h2 style="margin: 0; font-size: 1.25rem;">Payslip Details</h2>
                <button onclick="closeModal()" class="close-btn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6b7280;">&times;</button>
            </div>
            <div id="modal-content-body" style="padding: 1.5rem;">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>

    <script src="../js/auth.js?v=4"></script>
    <script src="../js/sidebar.js?v=4"></script>
    <script src="../js/payroll.js?v=7"></script>
</body>
</html>
