<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon" style="background: linear-gradient(135deg, #a5f3fc 0%, #06b6d4 100%);">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <h1>My Profile</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="history.back()" title="Go Back">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                    </button>
                    <button class="icon-btn" onclick="auth.logout()" title="Logout">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profile-avatar">?</div>
                        <div>
                            <h2 id="profile-name">Loading...</h2>
                            <p id="profile-role">Employee</p>
                        </div>
                    </div>
                    
                    <div class="card-body">
                        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">First Name</label>
                                <input type="text" id="firstName" class="form-control" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="lastName" class="form-control" disabled>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" disabled>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="tel" id="phone" class="form-control" disabled>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Designation</label>
                            <input type="text" id="designation" class="form-control" disabled>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Department</label>
                            <input type="text" id="department" class="form-control" disabled>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        // Render sidebar explicitly
        renderSidebar();
        
        async function loadProfile() {
            try {
                const res = await auth.apiCall('/api/users/profile');
                if (res && res.ok) {
                    const data = await res.json();
                    document.getElementById('profile-avatar').textContent = (data.username || 'U')[0].toUpperCase();
                    document.getElementById('profile-name').textContent = data.username || 'User';
                    document.getElementById('profile-role').textContent = data.role || 'Employee';
                    
                    document.getElementById('firstName').value = data.firstName || '';
                    document.getElementById('lastName').value = data.lastName || '';
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('designation').value = data.designation || '';
                    document.getElementById('department').value = data.department || '';
                }
            } catch (e) { 
                console.error('Failed to load profile:', e);
                auth.showNotification('Failed to load profile', 'error');
            }
        }
        
        loadProfile();
    </script>
    <style>
        .profile-header { display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem; border-bottom: 1px solid #e5e7eb; }
        .profile-avatar { width: 80px; height: 80px; background: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 700; }
        .profile-header h2 { font-size: 1.5rem; font-weight: 600; }
        .profile-header p { color: #6b7280; }
        .profile-form { padding: 1.5rem; }
    </style>
</body>
</html>
