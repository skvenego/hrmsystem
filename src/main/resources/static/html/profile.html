        <main class="main-content">
            <header class="dashboard-header">
                <h1>My Profile</h1>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profile-avatar">?</div>
                        <div>
                            <h2 id="profile-name">Loading...</h2>
                            <p id="profile-role">Employee</p>
                        </div>
                    </div>
                    
                    <form id="profile-form" class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">First Name</label>
                                <input type="text" name="firstName" id="firstName" class="form-input">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="lastName" id="lastName" class="form-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" id="email" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="tel" name="phone" id="phone" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <textarea name="address" id="address" class="form-input" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn-auth">Save Changes</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        async function loadProfile() {
            try {
                const user = auth.getCurrentUser();
                if (user) {
                    document.getElementById('profile-avatar').textContent = (user.username || 'U')[0].toUpperCase();
                    document.getElementById('profile-name').textContent = user.username || user.employeeName || 'User';
                    document.getElementById('profile-role').textContent = user.role || 'Employee';
                }
                
                const res = await auth.apiCall('/api/users/profile');
                if (res && res.ok) {
                    const data = await res.json();
                    document.getElementById('firstName').value = data.firstName || '';
                    document.getElementById('lastName').value = data.lastName || '';
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('address').value = data.address || '';
                }
            } catch (e) { console.error(e); }
        }
        
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await auth.apiCall('/api/users/profile', {
                    method: 'PUT',
                    body: JSON.stringify({
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        address: document.getElementById('address').value
                    })
                });
                if (res && res.ok) {
                    auth.showNotification('Profile updated', 'success');
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        function logout() { auth.logout(); }
        loadProfile();
    </script>
    <style>
        .profile-header { display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem; border-bottom: 1px solid #e5e7eb; }
        .profile-avatar { width: 80px; height: 80px; background: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 700; }
        .profile-header h2 { font-size: 1.5rem; font-weight: 600; }
        .profile-header p { color: #6b7280; }
        .profile-form { padding: 1.5rem; }
    </style>
