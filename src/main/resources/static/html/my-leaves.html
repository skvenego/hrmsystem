<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Leaves - HRM System</title>
    <link rel="stylesheet" href="../css/hrm-design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header flex justify-between items-center mb-6">
                <div class="page-title">
                    <h1>My Leave History</h1>
                    <p>Track your leave balances and application status</p>
                </div>
                <div class="flex gap-2 items-center">
                    <a href="leave-request.html" class="btn-primary flex items-center gap-2">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M12 4v16m8-8H4" />
                        </svg>
                        Apply Leave
                    </a>
                </div>
            </header>

            <div class="page-content">


                <div class="card p-0 overflow-hidden">
                    <div class="card-header border-b p-4">
                        <h3 class="card-title">Leave Applications</h3>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Type</th>
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Days</th>
                                    <th class="text-center">Paid</th>
                                    <th class="text-center">Unpaid</th>
                                    <th>Reason</th>
                                    <th>Approver</th>
                                    <th>Status</th>
                                    <th class="text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="leaves-table">
                                <tr>
                                    <td colspan="10" class="text-center p-8 text-muted">Loading applications...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Cancellation Reason Modal -->
    <div id="cancellation-modal" class="modal">
        <div class="modal-backdrop" onclick="closeCancellationModal()"></div>
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header border-b">
                <h3 class="modal-title text-danger">Leave Cancellation</h3>
                <button onclick="closeCancellationModal()" class="btn-icon">&times;</button>
            </div>
            <div class="modal-body space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-danger-50 flex items-center justify-center text-danger-600">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-800">Rejection Reason</h4>
                        <p class="text-xs text-muted">Provided by Admin/Manager</p>
                    </div>
                </div>

                <div class="card bg-gray-50 border-gray-200 p-4">
                    <p id="cancellation-reason-text" class="text-sm text-gray-700 leading-relaxed italic">No reason
                        provided</p>
                </div>

                <div class="flex justify-end pt-4 border-t">
                    <button onclick="closeCancellationModal()" class="btn-primary px-8">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');

        // Render sidebar explicitly
        renderSidebar();

        const user = auth.getCurrentUser();

        // Helper: count working days between two dates (excluding Sundays)
        function countDaysExcludingSundays(startDateStr, endDateStr) {
            if (!startDateStr || !endDateStr) return 0;
            const start = new Date(startDateStr);
            const end = new Date(endDateStr);
            let count = 0;
            const current = new Date(start);
            while (current <= end) {
                if (current.getDay() !== 0) count++; // 0 = Sunday
                current.setDate(current.getDate() + 1);
            }
            return count;
        }

        async function loadMyLeaves() {
            try {
                // Fetch centralized dashboard data (contains both attendance and leave balance)
                const timestamp = new Date().getTime();
                const res = await auth.apiCall(`/api/dashboard/my?_t=${timestamp}`);

                if (!res || !res.ok) {
                    throw new Error('Failed to load leave statistics');
                }

                const dashboardData = await res.json();
                const leaveBalanceData = dashboardData.leaveBalance;
                const attendance = dashboardData.attendance;

                if (!leaveBalanceData) {
                    throw new Error('Leave balance data missing');
                }

                const isInProbation = leaveBalanceData.inProbation;


                const resLeaves = await auth.apiCall('/api/leaves/my');
                const dataLeaves = resLeaves && resLeaves.ok ? await resLeaves.json() : [];

                const tbody = document.getElementById('leaves-table');
                if (!dataLeaves || dataLeaves.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center p-8 text-muted">No leave applications found</td></tr>';
                    return;
                }

                tbody.innerHTML = dataLeaves.map(l => {
                    const days = l.totalDays || countDaysExcludingSundays(l.startDate, l.endDate);
                    const isHalfDay = l.isHalfDay ? '<span class="text-primary">(Half)</span>' : '';

                    const paidDisplay = isInProbation
                        ? '<span class="text-muted text-xs">N/A</span>'
                        : (l.paidDays || 0);
                    const unpaidDisplay = isInProbation && (l.unpaidDays || 0) > 0
                        ? `<span class="text-danger font-bold">${l.unpaidDays || 0}</span>`
                        : (l.unpaidDays || 0);

                    const actionsCell = l.status === 'CANCELLED'
                        ? `<td class="text-center">
                            <button onclick="viewCancellationReason(${l.id})" class="btn-secondary" style="padding: 4px 12px; font-size: 0.75rem;">View Reason</button>
                           </td>`
                        : '<td class="text-center text-muted">-</td>';

                    return `
                        <tr>
                            <td><strong>${l.leaveType || 'CASUAL'}</strong></td>
                            <td>${auth.formatDate(l.startDate)}</td>
                            <td>${auth.formatDate(l.endDate)}</td>
                            <td>${days} ${isHalfDay}</td>
                            <td class="text-center">${paidDisplay}</td>
                            <td class="text-center">${unpaidDisplay}</td>
                            <td><span class="text-sm">${l.reason || '-'}</span></td>
                            <td><span class="text-sm font-semibold text-gray-700">${l.approverName || '-'}</span></td>
                            <td><span class="status-badge ${(l.status || 'PENDING').toLowerCase()}">${l.status || 'PENDING'}</span></td>
                            ${actionsCell}
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
                auth.showNotification('Failed to load leaves', 'error');
            }
        }

        async function viewCancellationReason(leaveId) {
            try {
                const res = await auth.apiCall(`/api/leaves/${leaveId}`);
                if (res && res.ok) {
                    const leave = await res.json();
                    const reason = leave.cancellationReason || 'No reason provided by admin';
                    document.getElementById('cancellation-reason-text').textContent = reason;
                    document.getElementById('cancellation-modal').classList.add('active');
                    document.body.style.overflow = 'hidden';
                    document.documentElement.style.overflow = 'hidden';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function closeCancellationModal() {
            document.getElementById('cancellation-modal').classList.remove('active');
            document.body.style.overflow = '';
            document.documentElement.style.overflow = '';
        }

        // Close modal when clicking outside
        document.getElementById('cancellation-modal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeCancellationModal();
            }
        });

        // Load data when page loads
        loadMyLeaves();
    </script>
</body>

</html>
