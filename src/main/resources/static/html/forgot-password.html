<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-password-container {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 450px;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e5e7eb;
            transition: background 0.3s;
        }
        .step-dot.active {
            background: #667eea;
        }
        .step-dot.completed {
            background: #10b981;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
            font-size: 0.875rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .btn-secondary {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .otp-input {
            letter-spacing: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.75rem; font-weight: 700; color: #1f2937; margin-bottom: 0.5rem;">Forgot Password</h1>
            <p style="color: #6b7280; font-size: 0.875rem;">Reset your password in 3 simple steps</p>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step-dot active" id="dot-1"></div>
            <div class="step-dot" id="dot-2"></div>
            <div class="step-dot" id="dot-3"></div>
        </div>

        <!-- Error/Success Messages -->
        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <!-- Step 1: Enter Email + Full Name -->
        <div class="step active" id="step-1">
            <form id="email-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="full-name" class="form-input" placeholder="Enter your registered full name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn-primary" id="send-otp-btn">Send OTP</button>
            </form>
        </div>

        <!-- Step 2: Enter OTP -->
        <div class="step" id="step-2">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <p style="color: #6b7280; font-size: 0.875rem;">Enter the 6-digit OTP sent to your email</p>
                <p style="color: #374151; font-size: 0.75rem; margin-top: 0.5rem;" id="email-display"></p>
            </div>
            <form id="otp-form">
                <div class="form-group">
                    <label class="form-label">OTP</label>
                    <input type="text" id="otp" class="form-input otp-input" placeholder="123456" maxlength="6" required>
                </div>
                <button type="submit" class="btn-primary" id="verify-otp-btn">Verify OTP</button>
                <button type="button" class="btn-secondary" id="resend-otp-btn" style="margin-top: 0.75rem;">Resend OTP</button>
            </form>
        </div>

        <!-- Step 3: Reset Password -->
        <div class="step" id="step-3">
            <form id="password-form">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" id="new-password" class="form-input" placeholder="Enter new password" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Confirm new password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" id="reset-password-btn">Reset Password</button>
            </form>
        </div>

        <!-- Success Screen -->
        <div class="step" id="step-success">
            <div style="text-align: center; padding: 2rem 0;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" style="margin-bottom: 1rem;">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <h2 style="font-size: 1.5rem; font-weight: 600; color: #1f2937; margin-bottom: 0.5rem;">Password Reset Successful!</h2>
                <p style="color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem;">You can now login with your new password</p>
                <a href="login.html" class="btn-primary" style="text-decoration: none; display: inline-block;">Go to Login</a>
            </div>
        </div>

        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        let currentEmail = '';
        let currentOtp = '';

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function goToStep(stepNumber) {
            // Hide all steps
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            // Show target step
            document.getElementById(`step-${stepNumber}`).classList.add('active');
            // Update dots
            document.querySelectorAll('.step-dot').forEach((dot, index) => {
                dot.classList.remove('active', 'completed');
                if (index + 1 === stepNumber) {
                    dot.classList.add('active');
                } else if (index + 1 < stepNumber) {
                    dot.classList.add('completed');
                }
            });
        }

        // Step 1: Send OTP
        document.getElementById('email-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            currentEmail = document.getElementById('email').value.trim();
            const fullName = document.getElementById('full-name').value.trim();

            const sendBtn = document.getElementById('send-otp-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Verifying...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, fullName: fullName })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('OTP sent to your registered email!');
                    document.getElementById('email-display').textContent = `OTP sent to: ${currentEmail}`;
                    goToStep(2);
                } else {
                    showError(data.error || 'Verification failed. Please check your name and email.');
                }
            } catch (error) {
                showError('Failed to send OTP. Please try again.');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send OTP';
            }
        });

        // Step 2: Verify OTP
        document.getElementById('otp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            currentOtp = document.getElementById('otp').value;
            
            const verifyBtn = document.getElementById('verify-otp-btn');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp: currentOtp })
                });
                
                const data = await res.json();
                
                if (res.ok && data.valid) {
                    showSuccess('OTP verified successfully');
                    goToStep(3);
                } else {
                    showError('Invalid or expired OTP');
                }
            } catch (error) {
                showError('Failed to verify OTP. Please try again.');
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify OTP';
            }
        });

        // Resend OTP
        document.getElementById('resend-otp-btn').addEventListener('click', async () => {
            const resendBtn = document.getElementById('resend-otp-btn');
            const fullName = document.getElementById('full-name').value.trim();
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, fullName: fullName })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('New OTP sent successfully!');
                } else {
                    showError(data.error || 'Failed to resend OTP');
                }
            } catch (error) {
                showError('Failed to resend OTP. Please try again.');
            } finally {
                resendBtn.disabled = false;
                resendBtn.textContent = 'Resend OTP';
            }
        });

        // Step 3: Reset Password
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            const resetBtn = document.getElementById('reset-password-btn');
            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        otp: currentOtp,
                        newPassword: newPassword,
                        confirmPassword: confirmPassword
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('Password reset successfully');
                    document.getElementById('step-3').classList.remove('active');
                    document.getElementById('step-success').classList.add('active');
                    document.querySelectorAll('.step-dot').forEach(dot => {
                        dot.classList.add('completed');
                    });
                } else {
                    showError(data.error || 'Failed to reset password');
                }
            } catch (error) {
                showError('Failed to reset password. Please try again.');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
