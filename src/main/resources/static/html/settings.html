<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon" style="background: linear-gradient(135deg, #f3f4f6 0%, #9ca3af 100%); color: #4b5563;">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>
                    <h1>Settings</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="history.back()" title="Go Back">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                    </button>
                    <button class="icon-btn" onclick="auth.logout()" title="Logout">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card" style="max-width: 600px;">
                    <div class="card-header">
                        <div>
                            <h3 class="card-title">Security Settings</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500); margin-top: 0.25rem;">Change your password. Your username (email) cannot be changed.</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <form id="password-form">
                            <div class="form-group">
                                <label class="form-label form-label-required">Current Password</label>
                                <input type="password" name="currentPassword" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label form-label-required">New Password</label>
                                <input type="password" name="newPassword" class="form-control" required minlength="6" placeholder="Minimum 6 characters">
                            </div>
                            <div class="form-group">
                                <label class="form-label form-label-required">Confirm New Password</label>
                                <input type="password" name="confirmPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Change Password</button>
                        </form>
                    </div>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <div class="card-header">
                        <h3 class="card-title">Notifications</h3>
                    </div>
                    <div class="card-body">
                        <div class="settings-list">
                            <label class="setting-item" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--gray-100);">
                                <span style="color: var(--gray-700);">Email Notifications</span>
                                <input type="checkbox" id="email-notif" checked style="width: 18px; height: 18px; accent-color: var(--primary);">
                            </label>
                            <label class="setting-item" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--gray-100);">
                                <span style="color: var(--gray-700);">Push Notifications</span>
                                <input type="checkbox" id="push-notif" checked style="width: 18px; height: 18px; accent-color: var(--primary);">
                            </label>
                            <label class="setting-item" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
                                <span style="color: var(--gray-700);">Monthly Reports</span>
                                <input type="checkbox" id="monthly-report" checked style="width: 18px; height: 18px; accent-color: var(--primary);">
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        // Render sidebar explicitly
        renderSidebar();
        
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            if (form.newPassword.value !== form.confirmPassword.value) {
                return auth.showNotification('Passwords do not match', 'error');
            }
            try {
                const res = await auth.apiCall('/api/auth/change-password', {
                    method: 'POST',
                    body: JSON.stringify({
                        currentPassword: form.currentPassword.value,
                        newPassword: form.newPassword.value,
                        confirmPassword: form.confirmPassword.value
                    })
                });
                if (res && res.ok) {
                    auth.showNotification('Password changed successfully', 'success');
                    form.reset();
                } else {
                    const data = await res.json();
                    auth.showNotification(data.error || 'Failed to change password', 'error');
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        document.querySelectorAll('.setting-item input').forEach(input => {
            input.addEventListener('change', async () => {
                auth.showNotification('Settings saved', 'success');
            });
        });
        
        function logout() { auth.logout(); }
    </script>
    <style>
        .settings-list { padding: 1.25rem; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #f3f4f6; }
        .setting-item:last-child { border-bottom: none; }
        .setting-item span { font-weight: 500; }
        .setting-item input { width: 20px; height: 20px; accent-color: #4f46e5; }
    </style>
</body>
</html>
