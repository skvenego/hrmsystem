        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1>Settings</h1>
            </header>

            <div class="page-content">
                <div class="card">
                    <h3 style="padding: 1.25rem; border-bottom: 1px solid #e5e7eb;">Security</h3>
                    <form id="password-form" class="profile-form">
                        <div class="form-group">
                            <label class="form-label">Current Password</label>
                            <input type="password" name="currentPassword" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">New Password</label>
                            <input type="password" name="newPassword" class="form-input" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" name="confirmPassword" class="form-input" required>
                        </div>
                        <button type="submit" class="btn-auth">Change Password</button>
                    </form>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <h3 style="padding: 1.25rem; border-bottom: 1px solid #e5e7eb;">Notifications</h3>
                    <div class="settings-list">
                        <label class="setting-item">
                            <span>Email Notifications</span>
                            <input type="checkbox" id="email-notif" checked>
                        </label>
                        <label class="setting-item">
                            <span>Push Notifications</span>
                            <input type="checkbox" id="push-notif" checked>
                        </label>
                        <label class="setting-item">
                            <span>Monthly Reports</span>
                            <input type="checkbox" id="monthly-report" checked>
                        </label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            if (form.newPassword.value !== form.confirmPassword.value) {
                return auth.showNotification('Passwords do not match', 'error');
            }
            try {
                const res = await auth.apiCall('/api/users/change-password', {
                    method: 'POST',
                    body: JSON.stringify({
                        currentPassword: form.currentPassword.value,
                        newPassword: form.newPassword.value
                    })
                });
                if (res && res.ok) {
                    auth.showNotification('Password changed', 'success');
                    form.reset();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        document.querySelectorAll('.setting-item input').forEach(input => {
            input.addEventListener('change', async () => {
                auth.showNotification('Settings saved', 'success');
            });
        });
        
        function logout() { auth.logout(); }
    </script>
    <style>
        .settings-list { padding: 1.25rem; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #f3f4f6; }
        .setting-item:last-child { border-bottom: none; }
        .setting-item span { font-weight: 500; }
        .setting-item input { width: 20px; height: 20px; accent-color: #4f46e5; }
    </style>
</body>
</html>
