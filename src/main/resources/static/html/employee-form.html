<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-section { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
        .form-section h3 { color: #4f46e5; margin-bottom: 1rem; font-size: 1.1rem; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        @media (max-width: 1024px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
        .salary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        @media (max-width: 1024px) { .salary-grid { grid-template-columns: repeat(2, 1fr); } }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-secondary { padding: 0.625rem 1.5rem; background: #6b7280; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                        </svg>
                    </div>
                    <h1 id="page-title">Add Employee</h1>
                </div>
                <a href="employees.html" class="btn-secondary">← Back to List</a>
            </header>

            <div class="page-content">
                <div class="card">
                    <form id="employee-form">
                        <!-- Personal Information -->
                        <div class="form-section">
                            <h3>👤 Personal Information</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">First Name *</label>
                                    <input type="text" name="firstName" id="firstName" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Last Name *</label>
                                    <input type="text" name="lastName" id="lastName" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email *</label>
                                    <input type="email" name="email" id="email" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Phone *</label>
                                    <input type="tel" name="phone" id="phone" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Gender *</label>
                                    <select name="gender" id="gender" class="form-input" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Joining Date *</label>
                                    <input type="date" name="joiningDate" id="joiningDate" class="form-input" required>
                                </div>
                                <div class="form-group" style="grid-column: span 3;">
                                    <label class="form-label">Address</label>
                                    <textarea name="address" id="address" class="form-input" rows="2"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Employment Details -->
                        <div class="form-section">
                            <h3>💼 Employment Details</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Department *</label>
                                    <select name="departmentId" id="departmentId" class="form-input" required>
                                        <option value="">Select Department</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Designation *</label>
                                    <input type="text" name="designation" id="designation" class="form-input" required placeholder="e.g., Developer, Manager">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Shift</label>
                                    <select name="shiftId" id="shiftId" class="form-input">
                                        <option value="">Select Shift</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Status</label>
                                    <select name="status" id="status" class="form-input">
                                        <option value="ACTIVE">Active</option>
                                        <option value="ON_LEAVE">On Leave</option>
                                        <option value="INACTIVE">Inactive</option>
                                        <option value="PROBATION">Probation</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Probation Period (Months)</label>
                                    <input type="number" name="probationPeriodMonths" id="probationPeriodMonths" class="form-input" min="0" value="3">
                                </div>
                            </div>
                        </div>

                        <!-- Salary Details -->
                        <div class="form-section">
                            <h3>💰 Salary Details</h3>
                            <div class="salary-grid">
                                <div class="form-group">
                                    <label class="form-label">Basic Salary *</label>
                                    <input type="number" name="basicSalary" id="basicSalary" class="form-input" required step="0.01" min="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">DA (Dearness Allowance)</label>
                                    <input type="number" name="da" id="da" class="form-input" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">HRA</label>
                                    <input type="number" name="hra" id="hra" class="form-input" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Other Allowance</label>
                                    <input type="number" name="otherAllowance" id="otherAllowance" class="form-input" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">PF (Provident Fund)</label>
                                    <input type="number" name="pf" id="pf" class="form-input" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Tax</label>
                                    <input type="number" name="tax" id="tax" class="form-input" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Insurance Name</label>
                                    <input type="text" name="insuranceName" id="insuranceName" class="form-input" placeholder="e.g., Health Insurance, Life Insurance">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Insurance (% of Salary)</label>
                                    <input type="number" name="insurancePercentage" id="insurancePercentage" class="form-input" step="0.01" min="0" max="100" value="0" placeholder="e.g., 0.4 for 0.4%">
                                    <small style="color: #6b7280; font-size: 0.75rem;">Enter percentage like 0.4 for 0.4% of total salary</small>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Total Salary (Auto)</label>
                                    <input type="number" name="salary" id="salary" class="form-input" readonly style="background: #f3f4f6; font-weight: 600;">
                                </div>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" id="submit-btn" class="btn-primary">💾 Save Employee</button>
                            <button type="button" onclick="resetForm()" class="btn-secondary">Reset</button>
                            <a href="employees.html" style="padding: 0.625rem 1.5rem; color: #6b7280;">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        // Load dropdowns
        async function loadDropdowns() {
            try {
                const [deptRes, shiftRes] = await Promise.all([
                    auth.apiCall('/api/departments'),
                    auth.apiCall('/api/shifts')
                ]);
                
                if (deptRes && deptRes.ok) {
                    const depts = await deptRes.json();
                    const deptSelect = document.getElementById('departmentId');
                    depts.forEach(d => {
                        deptSelect.innerHTML += `<option value="${d.id}">${d.name}</option>`;
                    });
                }
                
                if (shiftRes && shiftRes.ok) {
                    const shifts = await shiftRes.json();
                    const shiftSelect = document.getElementById('shiftId');
                    shifts.forEach(s => {
                        shiftSelect.innerHTML += `<option value="${s.id}">${s.name} (${s.startTime}-${s.endTime})</option>`;
                    });
                }
                
                // Mark dropdowns as loaded
                dropdownsLoaded = true;
                console.log('Dropdowns loaded');
                
                // If employee data was already loaded, set form values now
                if (employeeData) {
                    console.log('Setting employee values after dropdowns loaded');
                    setEmployeeFormValues(employeeData);
                }
            } catch (e) { console.error('Error loading dropdowns:', e); }
        }
        
        // Calculate total salary (GROSS only - basic + da + hra + other)
        function calculateTotal() {
            const basic = parseFloat(document.getElementById('basicSalary').value) || 0;
            const da = parseFloat(document.getElementById('da').value) || 0;
            const hra = parseFloat(document.getElementById('hra').value) || 0;
            const other = parseFloat(document.getElementById('otherAllowance').value) || 0;

            // Calculate GROSS salary only (NO deductions: PF, Tax, Insurance)
            const gross = basic + da + hra + other;
            document.getElementById('salary').value = gross.toFixed(2);
        }
        
        // Check if editing
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        
        // Store employee data globally to set after dropdowns load
        let employeeData = null;
        let dropdownsLoaded = false;
        
        if (editId) {
            document.getElementById('page-title').textContent = 'Edit Employee';
            document.getElementById('submit-btn').textContent = '💾 Update Employee';
            loadEmployee(editId);
        }
        
        async function loadEmployee(id) {
            try {
                const res = await auth.apiCall(`/api/employees/${id}`);
                if (res && res.ok) {
                    employeeData = await res.json();
                    console.log('Loaded employee:', employeeData);
                    
                    // If dropdowns already loaded, set values now
                    if (dropdownsLoaded) {
                        setEmployeeFormValues(employeeData);
                    }
                    // Otherwise, wait for dropdowns to load (see loadDropdowns)
                }
            } catch (e) { console.error('Error loading employee:', e); }
        }
        
        function setEmployeeFormValues(emp) {
            if (!emp) return;
            console.log('Setting form values, departmentId:', emp.departmentId);
            console.log('Full employee object:', emp);
            console.log('Insurance fields:', { 
                insuranceName: emp.insuranceName, 
                insurance_percentage: emp.insurance_percentage,
                insurancePercentage: emp.insurancePercentage 
            });
            
            document.getElementById('firstName').value = emp.firstName || '';
            document.getElementById('lastName').value = emp.lastName || '';
            document.getElementById('email').value = emp.email || '';
            document.getElementById('phone').value = emp.phone || '';
            // Gender comes as uppercase enum (MALE/FEMALE/OTHER), convert to Title Case for select
            const genderValue = emp.gender ? emp.gender.charAt(0) + emp.gender.slice(1).toLowerCase() : '';
            document.getElementById('gender').value = genderValue;
            document.getElementById('joiningDate').value = emp.joiningDate || '';
            document.getElementById('address').value = emp.address || '';
            document.getElementById('designation').value = emp.designation || '';
            document.getElementById('status').value = emp.status || 'ACTIVE';
            document.getElementById('probationPeriodMonths').value = emp.probationPeriodMonths || 3;
            document.getElementById('basicSalary').value = emp.basicSalary || 0;
            document.getElementById('da').value = emp.da || 0;
            document.getElementById('hra').value = emp.hra || 0;
            document.getElementById('otherAllowance').value = emp.otherAllowance || 0;
            document.getElementById('pf').value = emp.pf || 0;
            document.getElementById('tax').value = emp.tax || 0;
            document.getElementById('insuranceName').value = emp.insuranceName || '';
            document.getElementById('insurancePercentage').value = emp.insurancePercentage || 0;
            
            // Set dropdown values - these need options to exist first
            if (emp.departmentId) {
                const deptSelect = document.getElementById('departmentId');
                // Check if option exists
                if (deptSelect.querySelector(`option[value="${emp.departmentId}"]`)) {
                    deptSelect.value = emp.departmentId;
                } else {
                    console.warn('Department option not found for id:', emp.departmentId);
                }
            }
            
            if (emp.shiftId) {
                const shiftSelect = document.getElementById('shiftId');
                if (shiftSelect.querySelector(`option[value="${emp.shiftId}"]`)) {
                    shiftSelect.value = emp.shiftId;
                }
            }
            
            calculateTotal();
        }
        
        // Form submit
        document.getElementById('employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                joiningDate: document.getElementById('joiningDate').value,
                address: document.getElementById('address').value,
                departmentId: parseInt(document.getElementById('departmentId').value),
                designation: document.getElementById('designation').value,
                shiftId: document.getElementById('shiftId').value ? parseInt(document.getElementById('shiftId').value) : null,
                status: document.getElementById('status').value,
                probationPeriodMonths: parseInt(document.getElementById('probationPeriodMonths').value) || 0,
                basicSalary: parseFloat(document.getElementById('basicSalary').value) || 0,
                da: parseFloat(document.getElementById('da').value) || 0,
                hra: parseFloat(document.getElementById('hra').value) || 0,
                otherAllowance: parseFloat(document.getElementById('otherAllowance').value) || 0,
                pf: parseFloat(document.getElementById('pf').value) || 0,
                tax: parseFloat(document.getElementById('tax').value) || 0,
                insuranceName: document.getElementById('insuranceName').value || '',
                insurancePercentage: parseFloat(document.getElementById('insurancePercentage').value) || 0,
                salary: parseFloat(document.getElementById('salary').value) || 0
            };
            
            try {
                const url = editId ? `/api/employees/${editId}` : '/api/employees';
                const method = editId ? 'PUT' : 'POST';
                const res = await auth.apiCall(url, {
                    method: method,
                    body: JSON.stringify(data)
                });
                
                if (res && res.ok) {
                    auth.showNotification(editId ? 'Employee updated!' : 'Employee added!', 'success');
                    window.location.href = 'employees.html';
                } else {
                    const err = await res.text();
                    auth.showNotification('Error: ' + err, 'error');
                }
            } catch (e) {
                auth.showNotification('Error: ' + e.message, 'error');
            }
        });
        
        function resetForm() {
            document.getElementById('employee-form').reset();
            calculateTotal();
        }
        
        function logout() { auth.logout(); }
        
        loadDropdowns();
    </script>
</body>
</html>
