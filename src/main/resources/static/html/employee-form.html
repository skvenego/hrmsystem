<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - HRM System</title>
    <link rel="stylesheet" href="../css/hrm-design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header flex justify-between items-center mb-6">
                <div class="page-title">
                    <h1 id="page-title">Add Employee</h1>
                    <p>Enter employee personal and professional details</p>
                </div>
                <a href="employees.html" class="btn-secondary flex items-center gap-2">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to List
                </a>
            </header>

            <div class="page-content">
                <div class="card">
                    <form id="employee-form">
                        <!-- Personal Information -->
                        <div class="mb-8">
                            <h3 class="text-lg font-bold text-primary mb-4 flex items-center gap-2">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                Personal Information
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                <div class="form-group">
                                    <label class="form-label">First Name <span class="text-danger">*</span></label>
                                    <input type="text" name="firstName" id="firstName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Last Name <span class="text-danger">*</span></label>
                                    <input type="text" name="lastName" id="lastName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email <span class="text-danger">*</span></label>
                                    <input type="email" name="email" id="email" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Phone <span class="text-danger">*</span></label>
                                    <input type="tel" name="phone" id="phone" class="form-control" required pattern="^[6-9][0-9]{9}$" title="Phone number must be a valid 10-digit Indian mobile number starting with 6, 7, 8, or 9" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 10);">
                                    <small class="text-muted" style="color: #6b7280; font-size: 0.8rem; margin-top: 0.25rem; display: block;">10-digit Indian number starting with 6-9 (e.g., 9876543210)</small>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Gender <span class="text-danger">*</span></label>
                                    <select name="gender" id="gender" class="form-control" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Joining Date <span class="text-danger">*</span></label>
                                    <input type="date" name="joiningDate" id="joiningDate" class="form-control" required>
                                </div>
                                <div class="form-group col-span-full">
                                    <label class="form-label">Address</label>
                                    <textarea name="address" id="address" class="form-control" rows="2"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Employment Details -->
                        <div class="mb-8 pt-8 border-t">
                            <h3 class="text-lg font-bold text-primary mb-4 flex items-center gap-2">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                Employment Details
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                <div class="form-group">
                                    <label class="form-label">Department <span class="text-danger">*</span></label>
                                    <select name="departmentId" id="departmentId" class="form-control" required>
                                        <option value="">Select Department</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Designation <span class="text-danger">*</span></label>
                                    <input type="text" name="designation" id="designation" class="form-control" required placeholder="e.g., Developer, Manager">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Shift</label>
                                    <select name="shiftId" id="shiftId" class="form-control">
                                        <option value="">Select Shift</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Status</label>
                                    <select name="status" id="status" class="form-control">
                                        <option value="ACTIVE">Active</option>
                                        <option value="ON_LEAVE">On Leave</option>
                                        <option value="INACTIVE">Inactive</option>
                                        <option value="PROBATION">Probation</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Probation Period (Months)</label>
                                    <input type="number" name="probationPeriodMonths" id="probationPeriodMonths" class="form-control" min="0" value="3">
                                </div>
                            </div>
                        </div>

                        <!-- Salary Details -->
                        <div class="mb-8 pt-8 border-t">
                            <h3 class="text-lg font-bold text-primary mb-4 flex items-center gap-2">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                Salary Details
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div class="form-group">
                                    <label class="form-label">Basic Salary <span class="text-danger">*</span></label>
                                    <input type="number" name="basicSalary" id="basicSalary" class="form-control" required step="0.01" min="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">DA (Dearness Allowance)</label>
                                    <input type="number" name="da" id="da" class="form-control" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">HRA</label>
                                    <input type="number" name="hra" id="hra" class="form-control" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Other Allowance</label>
                                    <input type="number" name="otherAllowance" id="otherAllowance" class="form-control" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">PF (Provident Fund)</label>
                                    <input type="number" name="pf" id="pf" class="form-control" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Tax</label>
                                    <input type="number" name="tax" id="tax" class="form-control" step="0.01" min="0" value="0" onchange="calculateTotal()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Insurance Name</label>
                                    <input type="text" name="insuranceName" id="insuranceName" class="form-control" placeholder="e.g., Health Insurance">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Insurance (%)</label>
                                    <input type="number" name="insurancePercentage" id="insurancePercentage" class="form-control" step="0.01" min="0" max="100" value="0">
                                </div>
                                <div class="form-group col-span-full">
                                    <div class="p-4 bg-gray-50 rounded-lg flex justify-between items-center">
                                        <span class="text-sm font-bold text-gray-600 uppercase">Gross Salary (Automated)</span>
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs text-muted">Total:</span>
                                            <input type="number" name="salary" id="salary" class="bg-transparent border-none text-2xl font-bold text-primary text-right" readonly style="width: 150px;">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" id="submit-btn" class="btn-primary">💾 Save Employee</button>
                            <button type="button" onclick="resetForm()" class="btn-secondary">Reset</button>
                            <a href="employees.html" style="padding: 0.625rem 1.5rem; color: #6b7280;">Cancel</a>
                            <!-- Delete button injected here by JS for HR on edit mode -->
                            <button type="button" id="delete-btn" style="display:none; margin-left:auto; background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; border:none; border-radius:8px; padding:0.625rem 1.5rem; font-weight:600; cursor:pointer; display:none; align-items:center; gap:6px;" onclick="deleteEmployee()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>
                                Delete Employee
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        // Prevent read-only roles from accessing employee add/edit form
        const userRole = auth.getUserRole();
        if (userRole === 'ROLE_ACCOUNTANT' || userRole === 'ROLE_DIRECTOR' || userRole === 'ROLE_LEAVES') {
            auth.showNotification('Access denied: You do not have permission to add or edit employees', 'error');
            window.location.href = 'employees.html';
            throw new Error('Access denied');
        }
        
        // Load dropdowns
        async function loadDropdowns() {
            try {
                const [deptRes, shiftRes] = await Promise.all([
                    auth.apiCall('/api/departments'),
                    auth.apiCall('/api/shifts')
                ]);
                
                if (deptRes && deptRes.ok) {
                    const depts = await deptRes.json();
                    const deptSelect = document.getElementById('departmentId');
                    depts.forEach(d => {
                        deptSelect.innerHTML += `<option value="${d.id}">${d.name}</option>`;
                    });
                }
                
                if (shiftRes && shiftRes.ok) {
                    const shifts = await shiftRes.json();
                    const shiftSelect = document.getElementById('shiftId');
                    shifts.forEach(s => {
                        shiftSelect.innerHTML += `<option value="${s.id}">${s.name} (${s.startTime}-${s.endTime})</option>`;
                    });
                }
                
                // Mark dropdowns as loaded
                dropdownsLoaded = true;
                console.log('Dropdowns loaded');
                
                // If employee data was already loaded, set form values now
                if (employeeData) {
                    console.log('Setting employee values after dropdowns loaded');
                    setEmployeeFormValues(employeeData);
                }
            } catch (e) { console.error('Error loading dropdowns:', e); }
        }
        
        // Calculate total salary (GROSS only - basic + da + hra + other)
        function calculateTotal() {
            const basic = parseFloat(document.getElementById('basicSalary').value) || 0;
            const da = parseFloat(document.getElementById('da').value) || 0;
            const hra = parseFloat(document.getElementById('hra').value) || 0;
            const other = parseFloat(document.getElementById('otherAllowance').value) || 0;

            // Calculate GROSS salary only (NO deductions: PF, Tax, Insurance)
            const gross = basic + da + hra + other;
            document.getElementById('salary').value = gross.toFixed(2);
        }
        
        // Check if editing
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        
        // Store employee data globally to set after dropdowns load
        let employeeData = null;
        let dropdownsLoaded = false;
        
        if (editId) {
            document.getElementById('page-title').textContent = 'Edit Employee';
            document.getElementById('submit-btn').textContent = '💾 Update Employee';
            // Show delete button for HR/Admin only
            const isHR = auth.hasRole('ROLE_HR') || auth.hasRole('ROLE_ADMIN');
            if (isHR) {
                const deleteBtn = document.getElementById('delete-btn');
                deleteBtn.style.display = 'inline-flex';
            }
            loadEmployee(editId);
        }
        
        async function loadEmployee(id) {
            try {
                const res = await auth.apiCall(`/api/employees/${id}`);
                if (res && res.ok) {
                    employeeData = await res.json();
                    console.log('Loaded employee:', employeeData);
                    
                    // If dropdowns already loaded, set values now
                    if (dropdownsLoaded) {
                        setEmployeeFormValues(employeeData);
                    }
                    // Otherwise, wait for dropdowns to load (see loadDropdowns)
                }
            } catch (e) { console.error('Error loading employee:', e); }
        }
        
        function setEmployeeFormValues(emp) {
            if (!emp) return;
            console.log('Setting form values, departmentId:', emp.departmentId);
            console.log('Full employee object:', emp);
            console.log('Insurance fields:', { 
                insuranceName: emp.insuranceName, 
                insurance_percentage: emp.insurance_percentage,
                insurancePercentage: emp.insurancePercentage 
            });
            
            document.getElementById('firstName').value = emp.firstName || '';
            document.getElementById('lastName').value = emp.lastName || '';
            document.getElementById('email').value = emp.email || '';
            document.getElementById('phone').value = emp.phone || '';
            // Gender comes as uppercase enum (MALE/FEMALE/OTHER), convert to Title Case for select
            const genderValue = emp.gender ? emp.gender.charAt(0) + emp.gender.slice(1).toLowerCase() : '';
            document.getElementById('gender').value = genderValue;
            document.getElementById('joiningDate').value = emp.joiningDate || '';
            document.getElementById('address').value = emp.address || '';
            document.getElementById('designation').value = emp.designation || '';
            document.getElementById('status').value = emp.status || 'ACTIVE';
            document.getElementById('probationPeriodMonths').value = emp.probationPeriodMonths || 3;
            document.getElementById('basicSalary').value = emp.basicSalary || 0;
            document.getElementById('da').value = emp.da || 0;
            document.getElementById('hra').value = emp.hra || 0;
            document.getElementById('otherAllowance').value = emp.otherAllowance || 0;
            document.getElementById('pf').value = emp.pf || 0;
            document.getElementById('tax').value = emp.tax || 0;
            document.getElementById('insuranceName').value = emp.insuranceName || '';
            document.getElementById('insurancePercentage').value = emp.insurancePercentage || 0;
            
            // Set dropdown values - these need options to exist first
            if (emp.departmentId) {
                const deptSelect = document.getElementById('departmentId');
                // Check if option exists
                if (deptSelect.querySelector(`option[value="${emp.departmentId}"]`)) {
                    deptSelect.value = emp.departmentId;
                } else {
                    console.warn('Department option not found for id:', emp.departmentId);
                }
            }
            
            if (emp.shiftId) {
                const shiftSelect = document.getElementById('shiftId');
                if (shiftSelect.querySelector(`option[value="${emp.shiftId}"]`)) {
                    shiftSelect.value = emp.shiftId;
                }
            }
            
            calculateTotal();
        }
        
        // Form submit
        document.getElementById('employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                joiningDate: document.getElementById('joiningDate').value,
                address: document.getElementById('address').value,
                departmentId: parseInt(document.getElementById('departmentId').value),
                designation: document.getElementById('designation').value,
                shiftId: document.getElementById('shiftId').value ? parseInt(document.getElementById('shiftId').value) : null,
                status: document.getElementById('status').value,
                probationPeriodMonths: parseInt(document.getElementById('probationPeriodMonths').value) || 0,
                basicSalary: parseFloat(document.getElementById('basicSalary').value) || 0,
                da: parseFloat(document.getElementById('da').value) || 0,
                hra: parseFloat(document.getElementById('hra').value) || 0,
                otherAllowance: parseFloat(document.getElementById('otherAllowance').value) || 0,
                pf: parseFloat(document.getElementById('pf').value) || 0,
                tax: parseFloat(document.getElementById('tax').value) || 0,
                insuranceName: document.getElementById('insuranceName').value || '',
                insurancePercentage: parseFloat(document.getElementById('insurancePercentage').value) || 0,
                salary: parseFloat(document.getElementById('salary').value) || 0
            };
            
            try {
                const url = editId ? `/api/employees/${editId}` : '/api/employees';
                const method = editId ? 'PUT' : 'POST';
                const res = await auth.apiCall(url, {
                    method: method,
                    body: JSON.stringify(data)
                });
                
                if (res && res.ok) {
                    auth.showNotification(editId ? 'Employee updated!' : 'Employee added!', 'success');
                    window.location.href = 'employees.html';
                } else {
                    const err = await res.text();
                    auth.showNotification('Error: ' + err, 'error');
                }
            } catch (e) {
                auth.showNotification('Error: ' + e.message, 'error');
            }
        });
        
        function resetForm() {
            document.getElementById('employee-form').reset();
            calculateTotal();
        }

        async function deleteEmployee() {
            if (!editId) return;
            const name = (document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value).trim();
            if (!confirm(`⚠️ PERMANENT DELETE\n\nAre you sure you want to permanently delete:\n"${name}"\n\nThis will remove ALL their data including attendance, payslips, and leave records. This action CANNOT be undone!`)) return;
            try {
                const res = await auth.apiCall(`/api/employees/${editId}`, { method: 'DELETE' });
                if (res && res.ok) {
                    auth.showNotification(`Employee "${name}" deleted permanently.`, 'success');
                    setTimeout(() => { window.location.href = 'employees.html'; }, 1200);
                } else {
                    const err = await res.text();
                    auth.showNotification('Delete failed: ' + err, 'error');
                }
            } catch (e) {
                auth.showNotification('Error: ' + e.message, 'error');
            }
        }

        function logout() { auth.logout(); }
        
        loadDropdowns();
    </script>
</body>
</html>
