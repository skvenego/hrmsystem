<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payslips - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                    </div>
                    <h1>Payslips</h1>
                </div>
                <div class="header-actions">
                    <select id="monthFilter" onchange="filterByMonth()" class="filter-select" style="padding: 0.5rem; border-radius: 6px; border: 1px solid #d1f5db;">
                        <option value="">All Months</option>
                    </select>
                    <input type="text" id="search-input" placeholder="Search by employee..." class="search-input">
                    <button onclick="loadPayslips()" class="btn-primary">Refresh</button>
                    <button onclick="showRegenerateModal()" class="btn-warning" style="background: #f59e0b; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">Regenerate Month</button>
                    <button onclick="showGeneratePayslipModal()" class="btn-success" style="background: #10b981; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">Generate Payslip</button>
                </div>
            </header>

            <div class="page-content">
                <div id="payslips-grid" class="payslips-grid">
                    <!-- Payslip cards -->
                </div>
            </div>
        </main>
    </div>

    <!-- Payslip Detail Modal -->
    <div id="payslipModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: white; border-radius: 12px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
            <div class="modal-header" style="padding: 1.5rem; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Payslip Details</h2>
                <button class="close-btn" onclick="closePayslipModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body" id="payslipDetails" style="padding: 1.5rem;">
                <!-- Payslip details loaded dynamically -->
            </div>
            <div class="modal-footer" style="padding: 1rem 1.5rem; border-top: 1px solid #e5e7eb; display: flex; gap: 1rem; justify-content: flex-end;">
                <button onclick="downloadPayslipPdf()" id="downloadPayslipBtn" style="display: none; padding: 0.5rem 1rem; background: #16a34a; color: white; border: none; border-radius: 6px; cursor: pointer;">Download PDF</button>
                <button onclick="closePayslipModal()" style="padding: 0.5rem 1rem; background: #6b7280; color: white; border: none; border-radius: 6px; cursor: pointer;">Close</button>
            </div>
        </div>
    </div>

    <script src="../js/auth.js?v=5"></script>
    <script src="../js/sidebar.js?v=5"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
                const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        
        let allPayslips = []; // Store all payslips for filtering
        
        function getCurrentMonthYear() {
            const now = new Date();
            return `${monthNames[now.getMonth()]} ${now.getFullYear()}`;
        }
        
        function populateMonthFilter(payslips) {
            const monthFilter = document.getElementById('monthFilter');
            const months = [...new Set(payslips.map(p => p.monthYear).filter(m => m))].sort().reverse();
            
            // Keep current selection
            const currentSelection = monthFilter.value;
            
            monthFilter.innerHTML = '<option value="">All Months</option>';
            months.forEach(month => {
                monthFilter.innerHTML += `<option value="${month}">${month}</option>`;
            });
            
            // Restore selection if still valid
            if (currentSelection && months.includes(currentSelection)) {
                monthFilter.value = currentSelection;
            }
        }
        
        function filterByMonth() {
            displayPayslips(allPayslips);
        }
        
        function displayPayslips(data) {
            const grid = document.getElementById('payslips-grid');
            const selectedMonth = document.getElementById('monthFilter').value;
            
            // Filter by selected month if specified
            let filteredData = data;
            if (selectedMonth) {
                filteredData = data.filter(p => p.monthYear === selectedMonth);
            }
            
            // Deduplicate - keep only one payslip per employee (latest by ID)
            const uniqueEmployees = {};
            filteredData.forEach(p => {
                const empId = p.employeeId || p.employee?.id;
                if (!uniqueEmployees[empId] || p.id > uniqueEmployees[empId].id) {
                    uniqueEmployees[empId] = p;
                }
            });
            filteredData = Object.values(uniqueEmployees);
            
            if (!filteredData || filteredData.length === 0) {
                const message = selectedMonth 
                    ? `<h3>No Payslips for ${selectedMonth}</h3><p>No payslips found for the selected month.</p>`
                    : '<h3>No Payslips Found</h3><p>Generate payroll first to see payslips here.</p>';
                grid.innerHTML = `<div style="text-align: center; padding: 4rem; color: #6b7280;">${message}</div>`;
                return;
            }

                // Group by status for better organization
                const grouped = filteredData.reduce((acc, p) => {
                    const status = p.status || 'DRAFT';
                    if (!acc[status]) acc[status] = [];
                    acc[status].push(p);
                    return acc;
                }, {});

                let html = '';

                // Render each status group
                Object.keys(grouped).sort().forEach(status => {
                    const statusLabel = {
                        'DRAFT': 'Draft (Needs Generation)',
                        'GENERATED': 'Generated (Ready for Approval)',
                        'APPROVED': 'Approved (Ready to Send)',
                        'SENT': 'Sent to Employee',
                        'REJECTED': 'Rejected'
                    }[status] || status;

                    const statusColor = {
                        'DRAFT': '#9ca3af',
                        'GENERATED': '#3b82f6',
                        'APPROVED': '#8b5cf6',
                        'SENT': '#16a34a',
                        'REJECTED': '#dc2626'
                    }[status] || '#6b7280';

                    html += `<h3 style="margin: 1.5rem 0 1rem 0; color: ${statusColor}; font-size: 1rem; border-bottom: 2px solid ${statusColor}20; padding-bottom: 0.5rem;">${statusLabel} (${grouped[status].length})</h3>`;

                    html += grouped[status].map(p => {
                        const empName = p.employeeName || 'Unknown';
                        const canEdit = status === 'DRAFT' || status === 'GENERATED';
                        const isSent = status === 'SENT' || status === 'APPROVED';

                        return `
                        <div class="payslip-card" style="border: 2px solid ${statusColor}40; margin-bottom: 1rem;">
                            <div class="payslip-header">
                                <div class="payslip-avatar" style="background: linear-gradient(135deg, ${statusColor} 0%, ${statusColor}80 100%);">${empName[0] || '?'}</div>
                                <div>
                                    <h4>${empName}</h4>
                                    <p>${p.monthYear || 'N/A'}</p>
                                    <span style="background: ${statusColor}20; color: ${statusColor}; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600;">${statusLabel}</span>
                                </div>
                            </div>
                            <div class="payslip-body">
                                <div class="payslip-row"><span>Net Salary</span><strong>${auth.formatCurrency(p.netSalary || 0)}</strong></div>
                                <div class="payslip-row"><span>Gross</span><span>${auth.formatCurrency(p.grossSalary || 0)}</span></div>
                                <div class="payslip-row"><span>Total Deduction</span><span>${auth.formatCurrency(p.totalDeductions || 0)}</span></div>
                                <div class="payslip-row"><span>Basic</span><span>${auth.formatCurrency(p.basicSalary || 0)}</span></div>
                                <div class="payslip-row"><span>HRA</span><span>${auth.formatCurrency(p.hra || 0)}</span></div>
                                <div class="payslip-row"><span>DA</span><span>${auth.formatCurrency(p.da || 0)}</span></div>
                                <div class="payslip-row"><span>Other Allowance</span><span>${auth.formatCurrency(p.otherAllowance || 0)}</span></div>
                                ${p.leaveDays > 0 || p.halfDays > 0 ? `<div class="payslip-row" style="background: #f0f9ff; margin: 0.5rem -0.5rem; padding: 0.5rem; border-radius: 4px;"><span style="color: #0284c7;">Leaves: ${((p.leaveDays || 0) + (p.halfDays || 0) * 0.5).toFixed(1)} days (Paid: ${(p.paidLeaveDays || 0).toFixed(1)}, Unpaid: ${(p.unpaidLeaveDays || 0).toFixed(1)})</span></div>` : ''}
                            </div>
                            <div class="payslip-footer">
                                <button onclick="previewPayslip(${p.id})" class="btn-small">👁️ Preview</button>
                                <button onclick="downloadPayslipPDF(${p.id})" class="btn-small" style="background: #16a34a; color: white;">📥 Download PDF</button>
                                <button onclick="deletePayslip(${p.id})" class="btn-small" style="background: #dc2626; color: white;">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                    }).join('');
                });

                grid.innerHTML = html || '<div style="text-align: center; padding: 4rem; color: #6b7280;">No payslips found</div>';
        }

        async function editPayslip(id) {
            try {
                const res = await auth.apiCall(`/api/payslips/${id}`);
                if (!res || !res.ok) throw new Error('Failed to load payslip');
                const p = await res.json();

                const empName = p.employeeName || 'Unknown';

                const modal = document.createElement('div');
                modal.id = 'edit-modal';
                modal.className = 'modal';
                modal.style.cssText = 'display: flex; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;';
                modal.innerHTML = `
                    <div style="background: white; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #e5e7eb;">
                            <h3 style="margin: 0;">Edit Payslip - ${empName}</h3>
                            <button onclick="closeEditModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
                        </div>
                        <form id="edit-form" style="padding: 1.5rem;">
                            <input type="hidden" name="id" value="${p.id}">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">Basic Salary</label>
                                    <input type="number" name="basicSalary" value="${p.basicSalary || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">HRA</label>
                                    <input type="number" name="hra" value="${p.hra || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">DA</label>
                                    <input type="number" name="da" value="${p.da || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">PF</label>
                                    <input type="number" name="providentFund" value="${p.providentFund || p.pf || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">ESI</label>
                                    <input type="number" name="insurance" value="${p.insurance || p.otherDeduction || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">Income Tax</label>
                                    <input type="number" name="tax" value="${p.tax || p.incomeTax || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.25rem;">Other Deduction</label>
                                    <input type="number" name="otherDeductions" value="${p.otherDeductions || 0}" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
                                </div>
                            </div>
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <button type="button" onclick="closeEditModal()" style="padding: 0.5rem 1rem; border: 1px solid #e5e7eb; background: white; border-radius: 0.375rem; cursor: pointer;">Cancel</button>
                                <button type="submit" style="padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 0.375rem; cursor: pointer;">Save Changes</button>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(modal);

                document.getElementById('edit-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const data = Object.fromEntries(formData);

                    // Convert to numbers
                    ['basicSalary', 'hra', 'da', 'pf', 'esi', 'incomeTax', 'otherAllowance', 'otherDeduction'].forEach(key => {
                        data[key] = parseFloat(data[key]) || 0;
                    });

                    try {
                        const res = await auth.apiCall(`/api/payslips/${id}/update`, {
                            method: 'PUT',
                            body: JSON.stringify(data)
                        });
                        if (res && res.ok) {
                            auth.showNotification('Payslip updated successfully', 'success');
                            closeEditModal();
                            loadPayslips();
                        } else {
                            const err = await res.text();
                            auth.showNotification('Error: ' + err, 'error');
                        }
                    } catch (e) {
                        auth.showNotification('Error: ' + e.message, 'error');
                    }
                });
            } catch (e) {
                auth.showNotification('Error: ' + e.message, 'error');
            }
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-modal');
            if (modal) modal.remove();
        }

        async function previewPayslip(id) {
            try {
                const res = await auth.apiCall(`/api/payslips/${id}`);
                if (!res || !res.ok) throw new Error('Failed to load payslip');
                const p = await res.json();

                const modal = document.getElementById('payslipModal');
                const details = document.getElementById('payslipDetails');
                const downloadBtn = document.getElementById('downloadPayslipBtn');

                // Calculate leave deductions based on 26 working days (NOT 30)
                const dailyRate = (p.basicSalary || 0) / 26;
                const halfDayDeduction = dailyRate / 2;
                const fullDayDeduction = dailyRate;
                const absentDays = p.absentDays || 0;
                const halfDays = p.halfDays || 0;
                const leaveDays = p.leaveDays || 0;
                const paidLeaveDays = p.paidLeaveDays || 0;
                const unpaidLeaveDays = p.unpaidLeaveDays || 0;
                
                // Calculate attendance deductions - use backend value or calculate from components
                const calculatedAbsentDeduction = absentDays * dailyRate;
                const calculatedHalfDayDeduction = halfDays * dailyRate * 0.5;
                const calculatedUnpaidDeduction = unpaidLeaveDays * dailyRate;
                const calculatedTotalDeduction = calculatedAbsentDeduction + calculatedHalfDayDeduction + calculatedUnpaidDeduction;
                // Use backend-calculated deduction if available, otherwise use calculated
                const totalAttendanceDeduction = p.absentLeaveDeduction || (calculatedTotalDeduction > 0 ? calculatedTotalDeduction : 0);

                details.innerHTML = `
                    <div style="padding: 1rem;">
                        <!-- Employee Details Section -->
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
                            <h4 style="margin: 0 0 1rem 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 0.5rem;">👤 Employee Details</h4>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Name</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.employeeName || 'Unknown'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Employee ID</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.employeeId || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Department</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.department || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Designation</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.designation || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Email</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.email || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Phone</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.phone || '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Join Date</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${p.joinDate ? auth.formatDate(p.joinDate) : '-'}</p>
                                </div>
                                <div>
                                    <p style="margin: 0; font-size: 0.75rem; opacity: 0.9;">Basic Salary</p>
                                    <p style="margin: 0.25rem 0 0 0; font-weight: 600; font-size: 1rem;">${auth.formatCurrency(p.basicSalary || 0)}</p>
                                </div>
                            </div>
                        </div>

                        <div style="text-align: center; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 1rem;">
                            <h3 style="margin: 0; color: #1f2937;">Payslip - ${p.monthYear || 'N/A'}</h3>
                            <span class="status-badge ${(p.status || 'draft').toLowerCase()}" style="margin-top: 0.5rem; display: inline-block;">${p.status || 'Draft'}</span>
                        </div>

                        <!-- Paid Leave Balance Section -->
                        <div style="margin-bottom: 2rem; padding: 1rem; background: #f0fdf4; border-radius: 8px; border: 1px solid #86efac;">
                            <h4 style="color: #166534; margin-bottom: 1rem; border-bottom: 1px solid #86efac; padding-bottom: 0.5rem;">💰 Paid Leave Balance</h4>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1rem;">
                                <div style="text-align: center; padding: 0.75rem; background: white; border-radius: 6px;">
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #16a34a;">${((p.leaveBalance && typeof p.leaveBalance.totalEarnedLeaves === 'number') ? p.leaveBalance.totalEarnedLeaves : 0).toFixed(1)}</div>
                                    <div style="font-size: 0.75rem; color: #6b7280;">Total Earned</div>
                                </div>
                                <div style="text-align: center; padding: 0.75rem; background: white; border-radius: 6px;">
                                    ${p.inProbation || p.probationStatus === 'In Progress' ? 
                                        `<div style="font-size: 1.2rem; font-weight: bold; color: #dc2626;">⏳ In Progress (${p.probationMonths || 3} months)</div>
                                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">Joined: ${p.joinDate ? new Date(p.joinDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A'}<br>Complete: ${p.joinDate ? new Date(new Date(p.joinDate).setMonth(new Date(p.joinDate).getMonth() + (p.probationMonths || 3))).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A'}</div>` :
                                        `<div style="font-size: 1.2rem; font-weight: bold; color: #16a34a;">✅ Completed (${p.probationMonths || 3} months)</div>
                                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">Joined: ${p.joinDate ? new Date(p.joinDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A'}<br>Completed: ${p.joinDate ? new Date(new Date(p.joinDate).setMonth(new Date(p.joinDate).getMonth() + (p.probationMonths || 3))).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A'}</div>`
                                    }
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                                <div style="text-align: center; padding: 0.75rem; background: white; border-radius: 6px;">
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #d97706;">${((p.leaveBalance && typeof p.leaveBalance.usedLeaves === 'number') ? p.leaveBalance.usedLeaves : 0).toFixed(1)}</div>
                                    <div style="font-size: 0.75rem; color: #6b7280;">Used</div>
                                </div>
                                <div style="text-align: center; padding: 0.75rem; background: white; border-radius: 6px;">
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #16a34a;">${((p.leaveBalance && typeof p.leaveBalance.availableLeaves === 'number') ? p.leaveBalance.availableLeaves : 0).toFixed(1)}</div>
                                    <div style="font-size: 0.75rem; color: #6b7280;">Remaining</div>
                                </div>
                            </div>
                        </div>

                        <!-- Attendance & Leave Section -->
                        <div style="margin-bottom: 2rem; padding: 1rem; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <h4 style="color: #3b82f6; margin-bottom: 1rem; border-bottom: 1px solid #d1d5db; padding-bottom: 0.5rem;">📊 Attendance & Leave Summary</h4>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem;">
                                <div style="text-align: center; padding: 0.75rem; background: white; border-radius: 6px;">
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #059669;">${(p.presentDays || 0).toFixed(1)}</div>
                                    <div style="font-size: 0.75rem; color: #6b7280;">Present Days</div>
                                </div>
                                <div style="text-align: center; padding: 0.75rem; background: white; border-radius: 6px;">
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #dc2626;">${(p.absentDays || 0).toFixed(1)}</div>

                            <strong>💡 Leave Policy:</strong> During probation, no paid leave is allowed. After probation, you get 1.5 paid leaves per month. Unused leaves carry forward to next month within the cycle (Jan-Jun, Jul-Dec). At cycle end, remaining leaves expire.

                `;

                // Show download button only if status is SENT or APPROVED

                downloadBtn.style.display = canDownload ? 'inline-block' : 'none';

        function closePayslipModal() {
            const modal = document.getElementById('payslipModal');
            if (modal) modal.style.display = 'none';
        }

            window.open(`/api/payslips/${id}/download-pdf`, '_blank');

        async function deletePayslip(id) {
            if (!confirm('Are you sure you want to delete this payslip?')) return;
            
            try {
                const res = await auth.apiCall(`/api/payslips/${id}`, { method: 'DELETE' });
                if (res && (res.ok || res.status === 200 || res.status === 204)) {
                    alert('Payslip deleted successfully!');
                    // Force full page reload to clear cache and refresh data
                    window.location.reload();
                } else {
                    const error = await res.text();
                    alert('Error deleting payslip: ' + error);
                }
            } catch (err) {
                alert('Error deleting payslip: ' + err.message);
            }
        }

        async function regenerateMonth() {
            const monthYear = document.getElementById('regen-month-year').value;

            if (!monthYear) {
                alert('Please enter Month-Year (YYYY-MM)');
                return;
            }

            if (!confirm(`Are you sure you want to delete all payslips for ${monthYear} and regenerate them? This action cannot be undone.`)) {
                return;
            }

            try {
                const res = await auth.apiCall(`/api/payslips/regenerate-month?monthYear=${monthYear}`, { method: 'POST' });
                if (res && res.ok) {
                    alert('Payslips regenerated successfully!');
                    closeRegenerateModal();
                    loadPayslips();
                } else {
                    const error = await res.text();
                    alert('Error: ' + error);
                }
            } catch (err) {
                alert('Error regenerating payslips: ' + err.message);
            }
        }

        async function generatePayslip() {
            const employeeId = document.getElementById('gen-employee-id').value;
            const monthYear = document.getElementById('gen-month-year').value;
            
            if (!employeeId || !monthYear) {
                alert('Please enter both Employee ID and Month-Year');
                return;
            }
            
            try {
                const res = await auth.apiCall(`/api/payslips/generate-for-employee?employeeId=${employeeId}&monthYear=${monthYear}`, { method: 'POST' });
                if (res && res.ok) {
                    alert('Payslip generated successfully!');
                    closeGenerateModal();
                    loadPayslips();
                } else {
                    const error = await res.text();
                    alert('Error: ' + error);
                }
            } catch (err) {
                alert('Error generating payslip: ' + err.message);
            }
        }

        });
        
        async function loadPayslips() {
            try {
                const res = await auth.apiCall('/api/payslips?t=' + Date.now());
                const data = res && res.ok ? await res.json() : [];
                
                allPayslips = data || [];
                
                // Populate month filter
                populateMonthFilter(allPayslips);
                
                // Display payslips
                displayPayslips(allPayslips);

                auth.showNotification('Failed to load payslips', 'error');
