<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - HRM System</title>
    <link rel="stylesheet" href="../css/hrm-design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header flex justify-between items-center mb-6">
                <div class="page-title">
                    <h1>Departments</h1>
                    <p>Organize and manage organization units</p>
                </div>
                <div class="flex gap-2 items-center">
                    <button id="add-dept-btn" class="btn-primary flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
                        Add Department
                    </button>
                </div>
            </header>

            <div class="page-content">
                <!-- Stats Row -->
                <div class="stats-grid mb-6">
                    <div class="stat-card">
                        <div class="stat-icon-wrapper primary">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 21h18M5 21V7l8-4 8 4v14M9 21v-6h6v6"/>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">Total Departments</span>
                            <span class="stat-value" id="stat-departments">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper success">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">Total Employees</span>
                            <span class="stat-value" id="stat-employees">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper secondary">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                                <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                            </svg>
                        </div>
                        <div class="stat-content">
                            <span class="stat-label">Avg Employees</span>
                            <span class="stat-value" id="stat-avg">0</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Department List</h2>
                </div>

                <!-- Department Cards Grid -->
                <div id="departments-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <div class="col-span-full text-center p-8 text-muted">Loading...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="dept-modal" class="modal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header border-b">
                <h3 class="modal-title">Add Department</h3>
                <button onclick="closeModal()" class="btn-icon">&times;</button>
            </div>
            <div class="modal-body">
                <form id="dept-form">
                    <div class="form-group mb-4">
                        <label class="form-label">Department Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g. Information Technology">
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label">Department Code</label>
                        <input type="text" name="code" class="form-control" required placeholder="e.g. IT001">
                    </div>
                    <div class="form-group mb-6">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Brief description of the department..."></textarea>
                    </div>
                    <div class="flex gap-3 justify-end">
                        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Save Department</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        // Debug: Check auth status
        console.log('Page loaded, checking auth...');
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        console.log('Token exists:', !!token);
        console.log('User exists:', !!user);
        
        if (!token) {
            console.error('No token found, redirecting to login...');
            window.location.href = 'login.html';
        }
        
        if (!auth.requireAuth()) {
            console.error('Auth check failed');
            throw new Error('Auth required');
        }
        
        async function loadDepartments() {
            try {
                console.log('Loading departments...');
                const res = await auth.apiCall('/api/departments');

                if (!res || !res.ok) {
                    document.getElementById('departments-grid').innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: red;">Error loading departments</div>';
                    return;
                }

                const data = await res.json();
                console.log('Department data:', data);

                // Update stats
                const totalDepts = data.length;
                const totalEmployees = data.reduce((sum, d) => sum + (d.employeeCount || 0), 0);
                const avgEmployees = totalDepts > 0 ? Math.round(totalEmployees / totalDepts) : 0;
                document.getElementById('stat-departments').textContent = totalDepts;
                document.getElementById('stat-employees').textContent = totalEmployees;
                document.getElementById('stat-avg').textContent = avgEmployees;

                const grid = document.getElementById('departments-grid');
                if (!data || data.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #6b7280;">No departments found</div>';
                    return;
                }

                const colors = [
                    { bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', icon: 'briefcase' },
                    { bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)', icon: 'users' },
                    { bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)', icon: 'code' },
                    { bg: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)', icon: 'trending-up' },
                    { bg: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', icon: 'star' },
                    { bg: 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)', icon: 'heart' }
                ];

                grid.innerHTML = data.map((d, index) => {
                    return `
                        <div class="card p-4 flex flex-col justify-between" style="min-height: 180px;">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex items-center gap-3">
                                        <div class="stat-icon-wrapper primary" style="width: 40px; height: 40px; flex-shrink: 0;">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M3 21h18M5 21V7l8-4 8 4v14M9 21v-6h6v6"/>
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-sm mb-0">${d.name}</h3>
                                            <span class="badge badge-primary text-xs" style="margin-top: 2px; display: inline-block;">${d.code || '-'}</span>
                                        </div>
                                    </div>
                                    <button onclick="deleteDept(${d.id})" class="btn-danger btn-mini" title="Delete Department" style="flex-shrink: 0;">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    </button>
                                </div>
                                <div class="mt-2 text-xs text-muted" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;" title="${d.description || 'No description available'}">
                                    ${d.description || 'No description available'}
                                </div>
                            </div>
                            <div class="flex justify-between items-center mt-4 pt-3 border-t">
                                <div class="text-xs text-muted font-medium">Employees</div>
                                <div class="font-bold text-lg text-primary">${d.employeeCount || 0}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load departments error:', e);
                document.getElementById('departments-grid').innerHTML = `<div class="col-span-full text-center p-8 text-danger">Error: ${e.message}</div>`;
            }
        }
        
        function openModal() { 
            const modal = document.getElementById('dept-modal');
            modal.classList.add('active'); 
        }
        function closeModal() { 
            const modal = document.getElementById('dept-modal');
            modal.classList.remove('active'); 
        }
        
        document.getElementById('dept-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            try {
                const res = await auth.apiCall('/api/departments', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: form.name.value,
                        code: form.code.value,
                        description: form.description.value
                    })
                });
                if (res && res.ok) {
                    auth.showNotification('Department created', 'success');
                    closeModal();
                    loadDepartments();
                    form.reset();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        async function deleteDept(id) {
            if (!confirm('Delete this department?')) return;
            try {
                const res = await auth.apiCall(`/api/departments/${id}`, { method: 'DELETE' });
                if (res && res.ok) {
                    auth.showNotification('Department deleted', 'success');
                    loadDepartments();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        function editDept(id) { auth.showNotification('Edit department ' + id); }
        function logout() { auth.logout(); }

        loadDepartments();

        // Add event listener for Add Department button
        document.getElementById('add-dept-btn')?.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Add Department button clicked');
            openModal();
        });
    </script>
</body>
</html>
