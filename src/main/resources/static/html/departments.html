<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21h18M5 21V7l8-4 8 4v14M9 21v-6h6v6"/>
                        </svg>
                    </div>
                    <h1>Departments</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="auth.logout()" title="Logout">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <div class="page-header">
                    <button onclick="openModal()" class="btn-primary">+ Add Department</button>
                </div>

            <div class="page-content">
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>ID</th><th>Department Name</th><th>Code</th><th>Employees</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="dept-table">
                                <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            </div>
        </main>
    </div>

    <div id="dept-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Department</h3>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            <form id="dept-form">
                <div class="form-group">
                    <label class="form-label">Department Name</label>
                    <input type="text" name="name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Department Code</label>
                    <input type="text" name="code" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-input" rows="2"></textarea>
                </div>
                <button type="submit" class="btn-auth">Save Department</button>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        // Debug: Check auth status
        console.log('Page loaded, checking auth...');
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        console.log('Token exists:', !!token);
        console.log('User exists:', !!user);
        
        if (!token) {
            console.error('No token found, redirecting to login...');
            window.location.href = 'login.html';
        }
        
        if (!auth.requireAuth()) {
            console.error('Auth check failed');
            throw new Error('Auth required');
        }
        
        async function loadDepartments() {
            try {
                console.log('Loading departments...');
                console.log('Current user:', auth.getCurrentUser());
                console.log('Token:', localStorage.getItem('token'));
                
                const res = await auth.apiCall('/api/departments');
                console.log('Response:', res);
                
                if (!res) {
                    document.getElementById('dept-table').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: red;">Authentication failed</td></tr>';
                    return;
                }
                
                if (!res.ok) {
                    const resClone = res.clone();
                    const errorText = await resClone.text();
                    console.error('Error response:', errorText);
                    document.getElementById('dept-table').innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: red;">Error: ${res.status} - ${errorText.substring(0, 100)}</td></tr>`;
                    return;
                }
                
                const data = await res.json();
                console.log('Department data:', data);
                
                const tbody = document.getElementById('dept-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No departments</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(d => `
                    <tr>
                        <td>${d.id}</td>
                        <td>${d.name}</td>
                        <td>${d.code || '-'}</td>
                        <td>${d.employeeCount || 0}</td>
                        <td>
                            <button onclick="deleteDept(${d.id})" class="btn-small" style="background: #fee2e2; color: #991b1b;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { 
                console.error('Load departments error:', e);
                document.getElementById('dept-table').innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: red;">Error: ${e.message}</td></tr>`;
            }
        }
        
        function openModal() { document.getElementById('dept-modal').classList.add('active'); }
        function closeModal() { document.getElementById('dept-modal').classList.remove('active'); }
        
        document.getElementById('dept-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            try {
                const res = await auth.apiCall('/api/departments', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: form.name.value,
                        code: form.code.value,
                        description: form.description.value
                    })
                });
                if (res && res.ok) {
                    auth.showNotification('Department created', 'success');
                    closeModal();
                    loadDepartments();
                    form.reset();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        async function deleteDept(id) {
            if (!confirm('Delete this department?')) return;
            try {
                const res = await auth.apiCall(`/api/departments/${id}`, { method: 'DELETE' });
                if (res && res.ok) {
                    auth.showNotification('Department deleted', 'success');
                    loadDepartments();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        function editDept(id) { auth.showNotification('Edit department ' + id); }
        function logout() { auth.logout(); }

        loadDepartments();
    </script>
</body>
</html>
