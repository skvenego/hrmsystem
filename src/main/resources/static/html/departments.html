<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21h18M5 21V7l8-4 8 4v14M9 21v-6h6v6"/>
                        </svg>
                    </div>
                    <h1>Departments</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="auth.logout()" title="Logout">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <div class="page-content">
                    <!-- Stats Cards -->
                    <div class="stats-grid" style="margin-bottom: 2rem; grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card">
                            <div class="stat-icon blue">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 21h18M5 21V7l8-4 8 4v14M9 21v-6h6v6"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <h3 id="stat-departments">0</h3>
                                <p>Total Departments</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon green">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="9" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <h3 id="stat-employees">0</h3>
                                <p>Total Employees</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon purple">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                                    <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <h3 id="stat-avg">0</h3>
                                <p>Avg Employees/Dept</p>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="font-size: 1.25rem; font-weight: 600; color: #1f2937;">Department List</h2>
                        <button id="add-dept-btn" class="btn-primary" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
                            Add Department
                        </button>
                    </div>

                    <!-- Department Cards Grid -->
                    <div id="departments-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem;">
                        <div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #6b7280;">Loading...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="dept-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; border-radius: 12px; padding: 2rem; max-width: 500px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="font-size: 1.25rem; font-weight: 600; color: #1f2937;">Add Department</h3>
                <button onclick="closeModal()" style="background: none; border: none; font-size: 1.5rem; color: #6b7280; cursor: pointer; padding: 0.25rem; border-radius: 4px; line-height: 1;">&times;</button>
            </div>
            <form id="dept-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Department Name</label>
                    <input type="text" name="name" class="form-input" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; box-sizing: border-box;">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Department Code</label>
                    <input type="text" name="code" class="form-input" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; box-sizing: border-box;">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Description</label>
                    <textarea name="description" class="form-input" rows="3" style="width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; box-sizing: border-box; resize: vertical;"></textarea>
                </div>
                <button type="submit" class="btn-auth" style="width: 100%; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s;">Save Department</button>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        // Debug: Check auth status
        console.log('Page loaded, checking auth...');
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        console.log('Token exists:', !!token);
        console.log('User exists:', !!user);
        
        if (!token) {
            console.error('No token found, redirecting to login...');
            window.location.href = 'login.html';
        }
        
        if (!auth.requireAuth()) {
            console.error('Auth check failed');
            throw new Error('Auth required');
        }
        
        async function loadDepartments() {
            try {
                console.log('Loading departments...');
                const res = await auth.apiCall('/api/departments');

                if (!res || !res.ok) {
                    document.getElementById('departments-grid').innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: red;">Error loading departments</div>';
                    return;
                }

                const data = await res.json();
                console.log('Department data:', data);

                // Update stats
                const totalDepts = data.length;
                const totalEmployees = data.reduce((sum, d) => sum + (d.employeeCount || 0), 0);
                const avgEmployees = totalDepts > 0 ? Math.round(totalEmployees / totalDepts) : 0;
                document.getElementById('stat-departments').textContent = totalDepts;
                document.getElementById('stat-employees').textContent = totalEmployees;
                document.getElementById('stat-avg').textContent = avgEmployees;

                const grid = document.getElementById('departments-grid');
                if (!data || data.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #6b7280;">No departments found</div>';
                    return;
                }

                const colors = [
                    { bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', icon: 'briefcase' },
                    { bg: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)', icon: 'users' },
                    { bg: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)', icon: 'code' },
                    { bg: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)', icon: 'trending-up' },
                    { bg: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', icon: 'star' },
                    { bg: 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)', icon: 'heart' }
                ];

                grid.innerHTML = data.map((d, index) => {
                    const color = colors[index % colors.length];
                    return `
                        <div style="background: white; border-radius: 6px; padding: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.08); border: 1px solid #e5e7eb; transition: all 0.2s;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <div style="width: 32px; height: 32px; border-radius: 6px; background: ${color.bg}; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0;">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 21h18M5 21V7l8-4 8 4v14M9 21v-6h6v6"/>
                                        </svg>
                                    </div>
                                    <h3 style="font-size: 0.875rem; font-weight: 600; color: #1f2937; line-height: 1.2;">${d.name}</h3>
                                </div>
                                <button onclick="deleteDept(${d.id})" style="background: #fee2e2; color: #dc2626; border: none; padding: 0.25rem; border-radius: 4px; cursor: pointer;" title="Delete">
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="background: #f3f4f6; color: #6b7280; padding: 0.1rem 0.4rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 500;">${d.code || '-'}</span>
                                <div style="text-align: right;">
                                    <div style="font-size: 0.6rem; color: #6b7280;">Employees</div>
                                    <div style="font-size: 0.9rem; font-weight: 600; color: #1f2937;">${d.employeeCount || 0}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load departments error:', e);
                document.getElementById('departments-grid').innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: red;">Error: ${e.message}</div>`;
            }
        }
        
        function openModal() { 
            console.log('openModal called');
            const modal = document.getElementById('dept-modal');
            console.log('Modal element:', modal);
            modal.style.display = 'flex';
            modal.classList.add('active'); 
            console.log('Modal display set to flex');
        }
        function closeModal() { 
            const modal = document.getElementById('dept-modal');
            modal.style.display = 'none';
            modal.classList.remove('active'); 
        }
        
        document.getElementById('dept-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            try {
                const res = await auth.apiCall('/api/departments', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: form.name.value,
                        code: form.code.value,
                        description: form.description.value
                    })
                });
                if (res && res.ok) {
                    auth.showNotification('Department created', 'success');
                    closeModal();
                    loadDepartments();
                    form.reset();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        });
        
        async function deleteDept(id) {
            if (!confirm('Delete this department?')) return;
            try {
                const res = await auth.apiCall(`/api/departments/${id}`, { method: 'DELETE' });
                if (res && res.ok) {
                    auth.showNotification('Department deleted', 'success');
                    loadDepartments();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        function editDept(id) { auth.showNotification('Edit department ' + id); }
        function logout() { auth.logout(); }

        loadDepartments();

        // Add event listener for Add Department button
        document.getElementById('add-dept-btn')?.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Add Department button clicked');
            openModal();
        });
    </script>
</body>
</html>
