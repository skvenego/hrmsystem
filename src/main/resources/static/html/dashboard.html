<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                        </svg>
                    </div>
                    <h1>Dashboard</h1>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="auth.logout()" title="Logout">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <!-- Loading State -->
                <div id="loading" class="empty-state">
                    <div class="spinner" style="margin: 0 auto 1rem;"></div>
                    <p>Loading your dashboard...</p>
                </div>

                <!-- Dashboard Content -->
                <div id="dashboard-content" style="display: none;" class="animate-fade-in">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-employees">0</h3>
                            <p>Total Employees</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" x2="16" y1="2" y2="6"></line>
                                <line x1="8" x2="8" y1="2" y2="6"></line>
                                <line x1="3" x2="21" y1="10" y2="10"></line>
                                <path d="m9 16 2 2 4-4"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-present">0</h3>
                            <p>Present Today</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" x2="12" y1="2" y2="22"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-payroll">₹0</h3>
                            <p>Monthly Payroll</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" x2="8" y1="13" y2="13"></line>
                                <line x1="16" x2="8" y1="17" y2="17"></line>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-leave">0</h3>
                            <p>Leave Requests</p>
                        </div>
                    </div>
                </div>

                <!-- Main Grid -->
                <div class="dashboard-grid">
                    <!-- Recent Employees -->
                    <div class="card">
                        <div class="card-header">
                            <h3>Recent Employees</h3>
                            <a href="employees.html" class="view-all">View All</a>
                        </div>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Department</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="employees-table">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="card">
                        <div class="card-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="quick-actions">
                            <a href="employees.html" class="action-btn">
                                <div class="action-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="8.5" cy="7" r="4"></circle>
                                        <line x1="20" x2="20" y1="8" y2="14"></line>
                                        <line x1="23" x2="17" y1="11" y2="11"></line>
                                    </svg>
                                </div>
                                <span>Add Employee</span>
                            </a>
                            <a href="attendance.html" class="action-btn">
                                <div class="action-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" x2="16" y1="2" y2="6"></line>
                                        <line x1="8" x2="8" y1="2" y2="6"></line>
                                        <line x1="3" x2="21" y1="10" y2="10"></line>
                                    </svg>
                                </div>
                                <span>Mark Attendance</span>
                            </a>
                            <a href="payroll.html" class="action-btn">
                                <div class="action-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="12" x2="12" y1="2" y2="22"></line>
                                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                                    </svg>
                                </div>
                                <span>Process Payroll</span>
                            </a>
                            <a href="leave.html" class="action-btn">
                                <div class="action-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                    </svg>
                                </div>
                                <span>Leave Request</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        // Initialize dashboard based on role
        document.addEventListener('DOMContentLoaded', () => {
            const user = auth.getCurrentUser();
            console.log('Dashboard - Current user:', user);
            console.log('Dashboard - User role:', user?.role);
            console.log('Dashboard - Is management:', auth.isManagement());
            
            if (user) {
                const userNameEl = document.getElementById('user-name');
                if (userNameEl) {
                    userNameEl.textContent = `${user.username || user.employeeName || 'User'} (${auth.getRoleDisplayName()})`;
                }
            }
            
            if (auth.isManagement()) {
                console.log('Loading management dashboard');
                loadManagementDashboard();
            } else {
                console.log('Loading employee dashboard');
                loadEmployeeDashboard();
            }
        });
        
        // Employee Dashboard
        async function loadEmployeeDashboard() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';
            document.getElementById('dashboard-content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="m9 16 2 2 4-4"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="my-present">0</h3>
                            <p>Present This Month</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="my-leaves">0</h3>
                            <p>Leave Balance</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" x2="12" y1="2" y2="22"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="my-salary">₹0</h3>
                            <p>Last Month Salary</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="my-hours">0</h3>
                            <p>Hours Worked</p>
                        </div>
                    </div>
                </div>
                
                <!-- Quick Actions Grid -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
                    <!-- Apply Leave Card -->
                    <a href="leave-request.html" class="card" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; transition: transform 0.2s;">
                        <div class="stat-icon orange">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                        </div>
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem;">Apply Leave</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">Submit a new leave request</p>
                        </div>
                    </a>

                    <!-- My Leaves Card -->
                    <a href="my-leaves.html" class="card" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; transition: transform 0.2s;">
                        <div class="stat-icon green">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                        </div>
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem;">My Leaves</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">View your leave history</p>
                        </div>
                    </a>

                    <!-- My Payslips Card -->
                    <a href="my-payslips.html" class="card" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; transition: transform 0.2s;">
                        <div class="stat-icon purple">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem;">My Payslips</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">Download salary slips</p>
                        </div>
                    </a>

                    <!-- My Attendance Card -->
                    <a href="my-attendance.html" class="card" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; transition: transform 0.2s;">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem;">My Attendance</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">Check attendance records</p>
                        </div>
                    </a>

                    <!-- My Profile Card -->
                    <a href="profile.html" class="card" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; transition: transform 0.2s;">
                        <div class="stat-icon cyan">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem;">My Profile</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">View & edit your profile</p>
                        </div>
                    </a>

                    <!-- Settings Card -->
                    <a href="settings.html" class="card" style="text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; transition: transform 0.2s;">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f3f4f6 0%, #9ca3af 100%); color: #4b5563;">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 0.25rem;">Settings</h3>
                            <p style="font-size: 0.875rem; color: var(--gray-500);">Change password & preferences</p>
                        </div>
                    </a>
                </div>
            </div>
            `;
            
            // Load employee stats from new API
            try {
                const res = await auth.apiCall('/api/dashboard/my');
                if (res && res.ok) {
                    const data = await res.json();
                    
                    // Attendance
                    if (data.attendance) {
                        document.getElementById('my-present').textContent = data.attendance.presentDays || 0;
                        document.getElementById('my-hours').textContent = (data.attendance.totalHours || 0).toFixed(1);
                    }
                    
                    // Leave Balance
                    if (data.leaveBalance) {
                        const lb = data.leaveBalance;
                        const availableLeaves = lb.availableLeaves || 0;
                        const earnedLeaves = lb.totalEarnedLeaves || 0;
                        const carriedLeaves = lb.carriedForwardLeaves || 0;
                        const totalEarned = earnedLeaves + carriedLeaves;
                        
                        // Check if employee is in probation
                        if (lb.inProbation) {
                            // During probation: Available is 0, show earned in small text
                            document.getElementById('my-leaves').innerHTML = `<span style="color: #dc2626; font-weight: bold;">0</span><span style="font-size: 0.65rem; color: #6b7280; display: block;">(${totalEarned} frozen)</span>`;
                        } else {
                            // After probation: Show actual available balance
                            document.getElementById('my-leaves').textContent = availableLeaves;
                            document.getElementById('my-leaves').style.color = '';
                        }
                    }
                    
                    // Latest Payslip
                    if (data.latestPayslip && data.latestPayslip.netSalary) {
                        document.getElementById('my-salary').textContent = auth.formatCurrency(data.latestPayslip.netSalary);
                    }
                }
            } catch (e) { 
                console.error('Failed to load dashboard data:', e); 
            }
        }
        
        // Management Dashboard
        async function loadManagementDashboard() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';
            document.getElementById('dashboard-content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-employees">0</h3>
                            <p>Total Employees</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="m9 16 2 2 4-4"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-present">0</h3>
                            <p>Present Today</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" x2="12" y1="2" y2="22"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-payroll">₹0</h3>
                            <p>Monthly Payroll</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-leave">0</h3>
                            <p>Pending Leaves</p>
                        </div>
                    </div>
                </div>
            `;
            
            // Load stats
            try {
                const [empRes, attRes, leaveRes, payrollRes] = await Promise.all([
                    auth.apiCall('/api/employees'),
                    auth.apiCall(`/api/attendance/date/${new Date().toISOString().split('T')[0]}`),
                    auth.apiCall('/api/leaves'),
                    auth.apiCall('/api/payroll/list')
                ]);
                
                if (empRes?.ok) {
                    const emps = await empRes.json();
                    document.getElementById('stat-employees').textContent = emps.length || 0;
                }
                if (attRes?.ok) {
                    const att = await attRes.json();
                    document.getElementById('stat-present').textContent = att.filter(a => a.status === 'PRESENT').length;
                }
                if (leaveRes?.ok) {
                    const leaves = await leaveRes.json();
                    document.getElementById('stat-leave').textContent = leaves.filter(l => l.status === 'PENDING').length;
                }
                if (payrollRes?.ok) {
                    const payroll = await payrollRes.json();
                    const total = payroll.reduce((sum, p) => sum + (p.netSalary || 0), 0);
                    document.getElementById('stat-payroll').textContent = auth.formatCurrency(total);
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }
    </script>
</body>
</html>
