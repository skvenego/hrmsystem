<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Approvals - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <h1>Final Approvals</h1>
                </div>
                <span class="badge-director">Director View</span>

            <div class="page-content">
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Month</th><th>Net Salary</th><th>Accountant</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="approvals-table">
                                <tr><td colspan="5" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        async function loadApprovals() {
            try {
                const res = await auth.apiCall('/api/payroll/approvals/pending/director');
                const data = res && res.ok ? await res.json() : [];
                
                const tbody = document.getElementById('approvals-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No pending approvals</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td>${a.employeeName || 'Unknown'}</td>
                        <td>${a.month}/${a.year}</td>
                        <td>${auth.formatCurrency(a.netSalary || 0)}</td>
                        <td>${a.accountantApproved ? '✅ Approved' : '⏳ Pending'}</td>
                        <td>
                            <button onclick="approve(${a.id})" class="btn-small" style="background: #dcfce7; color: #166534;">Final Approve</button>
                            <button onclick="reject(${a.id})" class="btn-small" style="background: #fee2e2; color: #991b1b;">Reject</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        
        async function approve(id) {
            try {
                const res = await auth.apiCall(`/api/payroll/approvals/${id}/director/approve`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification('Final approval completed', 'success');
                    loadApprovals();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        async function reject(id) {
            const reason = prompt('Enter rejection reason:');
            if (!reason) return;
            try {
                const res = await auth.apiCall(`/api/payroll/approvals/${id}/director/reject`, {
                    method: 'POST',
                    body: JSON.stringify({ reason })
                });
                if (res && res.ok) {
                    auth.showNotification('Rejected', 'success');
                    loadApprovals();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        function logout() { auth.logout(); }
        loadApprovals();
    </script>
    <style>.badge-director { background: #dbeafe; color: #1e40af; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }</style>
</body>
</html>
