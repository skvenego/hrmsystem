        <main class="main-content">
            <header class="dashboard-header">
                <h1>Attendance</h1>
                <div class="header-actions">
                    <input type="date" id="date-input" class="search-input">
                    <button onclick="markAllPresent()" class="btn-primary">Mark All Present</button>
                </div>
            </header>

            <div class="page-content">
                <div id="popup" class="popup" style="display: none;">
                    <div class="popup-content">
                        <p id="popup-message"></p>
                        <button onclick="closePopup()">OK</button>
                    </div>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Date</th><th>Status</th><th>Check In</th><th>Check Out</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="attendance-table">
                                <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        let selectedDate = new Date().toISOString().split('T')[0];
        document.getElementById('date-input').value = selectedDate;
        
        function isFutureDate(date) {
            const selected = new Date(date);
            selected.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            return selected > today;
        }
        
        async function loadAttendance() {
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot view attendance for future dates');
                return;
            }
            
            try {
                const res = await auth.apiCall(`/api/attendance/date/${selectedDate}`);
                const data = res && res.ok ? await res.json() : [];
                
                const tbody = document.getElementById('attendance-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No attendance records</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td>${a.employeeName || 'Unknown'}</td>
                        <td>${a.date}</td>
                        <td><span class="status-badge ${(a.status || 'PENDING').toLowerCase()}">${a.status || 'PENDING'}</span></td>
                        <td>${a.checkInTime || '-'}</td>
                        <td>${a.checkOutTime || '-'}</td>
                        <td>
                            ${!isFutureDate(selectedDate) ? `
                                <button onclick="markPresent(${a.employeeId})" class="btn-small" ${a.status === 'PRESENT' ? 'disabled' : ''}>Present</button>
                                <button onclick="markAbsent(${a.employeeId})" class="btn-small" ${a.status === 'ABSENT' ? 'disabled' : ''}>Absent</button>
                            ` : '<span style="color: #9ca3af;">Future date</span>'}
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        async function markPresent(empId) {
            if (isFutureDate(selectedDate)) return showPopup('Cannot mark future dates');
            try {
                const res = await auth.apiCall(`/api/attendance/mark-present/${empId}?date=${selectedDate}`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification('Marked present', 'success');
                    loadAttendance();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        async function markAbsent(empId) {
            if (isFutureDate(selectedDate)) return showPopup('Cannot mark future dates');
            try {
                const res = await auth.apiCall(`/api/attendance/mark-absent/${empId}?date=${selectedDate}`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification('Marked absent', 'success');
                    loadAttendance();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        async function markAllPresent() {
            if (isFutureDate(selectedDate)) return showPopup('Cannot mark future dates');
            const rows = document.querySelectorAll('#attendance-table tr');
            for (const row of rows) {
                const empId = row.querySelector('button')?.getAttribute('onclick')?.match(/\d+/)?.[0];
                if (empId) await markPresent(empId);
            }
        }
        
        function showPopup(msg) {
            document.getElementById('popup-message').textContent = msg;
            document.getElementById('popup').style.display = 'flex';
        }
        
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }
        
        function logout() { auth.logout(); }
        
        document.getElementById('date-input').addEventListener('change', (e) => {
            selectedDate = e.target.value;
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot select future dates');
                e.target.value = new Date().toISOString().split('T')[0];
                selectedDate = e.target.value;
                return;
            }
            loadAttendance();
        });
        
        loadAttendance();
    </script>
    <style>
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .popup-content { background: white; padding: 2rem; border-radius: 12px; text-align: center; }
        .popup-content button { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</body>
