<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - HRM System</title>
    <link rel="stylesheet" href="../css/employee-theme.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="page-title">
                    <div class="page-title-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <h1>Attendance Management</h1>
                </div>
                <div class="header-actions" style="display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end;">
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="date" id="date-input" class="search-input" style="padding: 0.5rem; border-radius: 6px; border: 1px solid #d1d5db;">
                        <button onclick="markAllPresent()" class="btn-primary" style="background: #16a34a; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">✓ All Present</button>
                        <button onclick="markAllAbsent()" class="btn-secondary" style="background: #dc2626; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">✗ All Absent</button>
                        <button onclick="clearAllAttendance()" class="btn-danger" style="background: #b91c1c; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">🗑️ Clear All</button>
                        <button onclick="filterPendingOnly()" id="filter-pending-btn" style="background: #eab308; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer;">⚠ Pending Only</button>
                    </div>
                    <input type="text" id="search-input" placeholder="🔍 Search employee by name..." style="padding: 0.5rem; border-radius: 6px; border: 1px solid #d1d5db; width: 300px;" onkeyup="filterEmployees()">
                </div>
            </header>

            <div class="page-content">
                <div id="popup" class="popup" style="display: none;">
                    <div class="popup-content">
                        <p id="popup-message"></p>
                        <button onclick="closePopup()">OK</button>
                    </div>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Date</th><th>Status</th><th>Check In</th><th>Check Out</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="attendance-table">
                                <tr><td colspan="6" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        if (!auth.requireAuth()) throw new Error('Auth required');
        
        let selectedDate = new Date().toISOString().split('T')[0];
        document.getElementById('date-input').value = selectedDate;
        
        function isFutureDate(date) {
            const selected = new Date(date);
            selected.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            return selected > today;
        }
        
        // SUNDAY CHECK: Returns true if date is Sunday
        function isSunday(date) {
            const d = new Date(date);
            return d.getDay() === 0; // 0 = Sunday
        }
        
        let allEmployees = [];
        let attendanceData = [];
        let filteredEmployees = [];
        
        async function loadAllEmployees() {
            try {
                const res = await auth.apiCall('/api/employees');
                if (res && res.ok) {
                    allEmployees = await res.json();
                }
            } catch (e) {
                console.error('Failed to load employees:', e);
            }
        }
        
        async function loadAttendance() {
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot view attendance for future dates');
                return;
            }
            
            // SUNDAY CHECK: Show warning and disable actions
            if (isSunday(selectedDate)) {
                showPopup('⚠️ Sunday is a non-working day. Attendance cannot be marked.');
            }
            
            try {
                // First ensure we have all employees
                if (allEmployees.length === 0) {
                    await loadAllEmployees();
                }
                
                // Load attendance for selected date
                const res = await auth.apiCall(`/api/attendance/date/${selectedDate}`);
                attendanceData = res && res.ok ? await res.json() : [];
                console.log('Loaded attendance data for date', selectedDate, ':', attendanceData);
                
                const tbody = document.getElementById('attendance-table');
                
                // Merge all employees with attendance data
                const mergedData = allEmployees.map(emp => {
                    const attendance = attendanceData.find(a => a.employeeId === emp.id);
                    
                    // Extract department name from departmentName field
                    const deptName = emp.departmentName || emp.department || '-';
                    
                    const status = attendance?.status || 'NOT_MARKED';
                    console.log(`Employee ${emp.id} (${emp.firstName}) status:`, status);
                    
                    return {
                        employeeId: emp.id,
                        employeeName: `${emp.firstName || ''} ${emp.lastName || ''}`.trim() || 'Unknown',
                        department: deptName,
                        date: selectedDate,
                        status: status,
                        checkInTime: attendance?.checkInTime || '-',
                        checkOutTime: attendance?.checkOutTime || '-',
                        isFuture: isFutureDate(selectedDate)
                    };
                });
                
                if (mergedData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No employees found</td></tr>';
                    return;
                }
                
                // Store for filtering
                filteredEmployees = mergedData;
                renderAttendanceTable(mergedData);
            } catch (e) {
                console.error(e);
                const tbody = document.getElementById('attendance-table');
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: #dc2626;">Error loading attendance data</td></tr>';
            }
        }

        function renderAttendanceTable(data) {
            const tbody = document.getElementById('attendance-table');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No employees found matching your search</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map(a => {
                const status = a.status || 'NOT_MARKED';
                const statusClass = status.toLowerCase();
                const isPresent = status === 'PRESENT';
                const isAbsent = status === 'ABSENT';
                const isHalfDay = status === 'HALF_DAY';
                const isPending = status === 'PENDING';
                const isNotMarked = status === 'NOT_MARKED';
                const isPaidLeave = status === 'PAID_LEAVE';
                const isUnpaidLeave = status === 'UNPAID_LEAVE';
                
                return `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <div style="width: 36px; height: 36px; background: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.875rem;">${a.employeeName.charAt(0) || '?'}</div>
                                <div>
                                    <div style="font-weight: 600;">${a.employeeName}</div>
                                    <div style="font-size: 0.75rem; color: #6b7280;">${a.department}</div>
                                    <button onclick="viewEmployeeDetails(${a.employeeId})" class="btn-view" style="margin-top: 4px; padding: 2px 8px; font-size: 0.7rem; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">👁 View Details</button>
                                </div>
                            </div>
                        </td>
                        <td>${a.date}</td>
                        <td>
                            <span class="status-badge ${statusClass}" style="
                                background: ${isPresent ? '#dcfce7' : isAbsent ? '#fee2e2' : isHalfDay ? '#fef3c7' : isPending ? '#fef9c3' : isPaidLeave ? '#dbeafe' : isUnpaidLeave ? '#fee2e2' : '#f3f4f6'};
                                color: ${isPresent ? '#166534' : isAbsent ? '#991b1b' : isHalfDay ? '#92400e' : isPending ? '#854d0e' : isPaidLeave ? '#1e40af' : isUnpaidLeave ? '#991b1b' : '#6b7280'};
                                border: 1px solid ${isPresent ? '#86efac' : isAbsent ? '#fca5a5' : isHalfDay ? '#fcd34d' : isPending ? '#fde047' : isPaidLeave ? '#60a5fa' : isUnpaidLeave ? '#fca5a5' : '#d1d5db'};
                            ">${isPaidLeave || isUnpaidLeave ? `LEAVE ${a.remarks || 'Unknown'} (${isPaidLeave ? 'PAID' : 'UNPAID'})` : status.replace(/_/g, ' ')}</span>
                        </td>
                        <td>${a.checkInTime}</td>
                        <td>${a.checkOutTime}</td>
                        <td>${isUnpaidLeave ? 'Unpaid Leave' : (isPaidLeave ? 'Paid Leave' : (a.workingHours !== undefined ? a.workingHours + ' hrs' : '-'))}</td>
                        <td>
                            ${!a.isFuture ? `
                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                                    ${isPaidLeave || isUnpaidLeave ? `
                                        <span style="color: #6b7280; font-size: 0.875rem; font-style: italic;">On Leave</span>
                                    ` : isPending ? `
                                        <button onclick="resolvePendingAttendance(${a.employeeId}, 'PRESENT', this)" class="btn-toggle" data-status="present" title="Mark Present" style="background: #22c55e; color: white;">
                                            <span style="width: 10px; height: 10px; background: white; border-radius: 50%; display: inline-block; margin-right: 4px;"></span> Present
                                        </button>
                                        <button onclick="resolvePendingAttendance(${a.employeeId}, 'ABSENT', this)" class="btn-toggle" data-status="absent" title="Mark Absent" style="background: #ef4444; color: white;">
                                            <span style="width: 10px; height: 10px; background: white; border-radius: 50%; display: inline-block; margin-right: 4px;"></span> Absent
                                            <span style="width: 10px; height: 10px; background: white; border-radius: 50%; display: inline-block; margin-right: 4px;"></span>✗ Absent
                                        </button>
                                    ` : `
                                        <button onclick="setAttendance(${a.employeeId}, 'PRESENT')" class="btn-toggle ${isPresent ? 'active' : ''}" data-status="present" title="Mark Present">
                                            <span style="width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 4px;"></span>P
                                        </button>
                                        <button onclick="setAttendance(${a.employeeId}, 'HALF_DAY')" class="btn-toggle ${isHalfDay ? 'active' : ''}" data-status="half" title="Mark Half Day">
                                            <span style="width: 10px; height: 10px; background: #f59e0b; border-radius: 50%; display: inline-block; margin-right: 4px;"></span>H
                                        </button>
                                        <button onclick="setAttendance(${a.employeeId}, 'ABSENT')" class="btn-toggle ${isAbsent ? 'active' : ''}" data-status="absent" title="Mark Absent">
                                            <span style="width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; margin-right: 4px;"></span>A
                                        </button>
                                    `}
                                </div>
                            ` : '<span style="color: #9ca3af; font-size: 0.875rem;">Future</span>'}
                        </td>
                    </tr>
                `}).join('');
        }
        
        function filterEmployees() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            if (!searchTerm) {
                renderAttendanceTable(filteredEmployees);
                return;
            }

            const filtered = filteredEmployees.filter(emp =>
                emp.employeeName.toLowerCase().includes(searchTerm) ||
                emp.department.toLowerCase().includes(searchTerm)
            );

            renderAttendanceTable(filtered);
        }

        let showPendingOnly = false;
        function filterPendingOnly() {
            showPendingOnly = !showPendingOnly;
            const btn = document.getElementById('filter-pending-btn');

            if (showPendingOnly) {
                btn.style.background = '#ca8a04';
                btn.textContent = '✓ Show All';
                const pendingOnly = filteredEmployees.filter(emp => emp.status === 'PENDING');
                renderAttendanceTable(pendingOnly);
            } else {
                btn.style.background = '#eab308';
                btn.textContent = '⚠ Pending Only';
                renderAttendanceTable(filteredEmployees);
            }
        }
        
        async function viewEmployeeDetails(empId) {
            try {
                const emp = allEmployees.find(e => e.id === empId);
                if (!emp) {
                    auth.showNotification('Employee not found', 'error');
                    return;
                }
                
                // Get department name from departmentName field
                const deptName = emp.departmentName || emp.department || 'N/A';
                
                // Get join date - could be joiningDate or joinDate
                const joinDate = emp.joiningDate || emp.joinDate || 'N/A';
                
                const modal = document.createElement('div');
                modal.className = 'employee-modal';
                modal.innerHTML = `
                    <div class="modal-overlay" onclick="closeEmployeeModal()"></div>
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Employee Details</h2>
                            <button onclick="closeEmployeeModal()" class="close-btn">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="emp-avatar">${(emp.firstName || '')[0]}${(emp.lastName || '')[0]}</div>
                            <h3>${emp.firstName || ''} ${emp.lastName || ''}</h3>
                            <p class="emp-designation">${emp.designation || 'N/A'}</p>
                            
                            <div class="emp-details-grid">
                                <div class="detail-item">
                                    <label>Employee ID</label>
                                    <span>${emp.id}</span>
                                </div>
                                <div class="detail-item">
                                    <label>Department</label>
                                    <span>${deptName}</span>
                                </div>
                                <div class="detail-item">
                                    <label>Email</label>
                                    <span>${emp.email || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <label>Phone</label>
                                    <span>${emp.phone || 'N/A'}</span>
                                </div>
                                <div class="detail-item">
                                    <label>Join Date</label>
                                    <span>${joinDate}</span>
                                </div>
                                <div class="detail-item">
                                    <label>Salary</label>
                                    <span>${emp.salary ? '₹' + emp.salary : 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            } catch (e) {
                console.error(e);
                auth.showNotification('Failed to load employee details', 'error');
            }
        }
        
        function closeEmployeeModal() {
            const modal = document.querySelector('.employee-modal');
            if (modal) modal.remove();
        }

        async function setAttendance(empId, status) {
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot mark attendance for future dates');
                return;
            }
            
            // SUNDAY CHECK: Block attendance marking on Sundays
            if (isSunday(selectedDate)) {
                showPopup('❌ Sunday is a non-working day. Attendance cannot be marked.');
                return;
            }

            try {
                const res = await auth.apiCall(`/api/attendance/mark-${status.toLowerCase().replace('_', '-')}/${empId}?date=${selectedDate}`, { method: 'POST' });
                if (res && res.ok) {
                    auth.showNotification(`Marked ${status.replace(/_/g, ' ').toLowerCase()}`, 'success');
                    // Force reload attendance data to reflect the change
                    await loadAttendance();
                } else {
                    const error = await res.text();
                    auth.showNotification(error || 'Failed to mark attendance', 'error');
                }
            } catch (e) {
                console.error(e);
                auth.showNotification('Failed to mark attendance', 'error');
            }
        }

        async function resolvePendingAttendance(empId, newStatus, buttonElement) {
            console.log('resolvePendingAttendance called with empId:', empId, 'newStatus:', newStatus, 'buttonElement:', !!buttonElement);
            try {
                // Change button color to blue to indicate processing
                if (buttonElement) {
                    buttonElement.style.background = '#3b82f6';
                    buttonElement.style.opacity = '0.7';
                    console.log('Button color changed to blue');
                }

                // Update status badge immediately for visual feedback
                const row = buttonElement ? buttonElement.closest('tr') : null;
                console.log('Row found:', !!row);
                if (row) {
                    console.log('Calling updateStatusBadge with newStatus:', newStatus);
                    updateStatusBadge(row, newStatus);
                } else {
                    console.error('Could not find row from button element');
                }

                // Find the attendance record for this employee and date
                const attRes = await auth.apiCall(`/api/attendance/date/${selectedDate}`);
                if (attRes && attRes.ok) {
                    const attendanceList = await attRes.json();
                    const attendance = attendanceList.find(a => a.employeeId === empId);

                    if (attendance && attendance.id) {
                        console.log('Resolving attendance ID:', attendance.id, 'to status:', newStatus);
                        const res = await auth.apiCall(`/api/attendance/${attendance.id}/resolve-pending?newStatus=${newStatus}`, { method: 'PUT' });
                        if (res && res.ok) {
                            const result = await res.json();
                            console.log('Resolve response:', result);
                            auth.showNotification(`Resolved PENDING to ${newStatus}`, 'success');
                            // Clear cached data and force reload
                            attendanceData = [];
                            await loadAttendance();
                        } else {
                            const error = await res.text();
                            console.error('Resolve failed:', error);
                            auth.showNotification(error || 'Failed to resolve pending attendance', 'error');
                            // Reset button color on error
                            if (buttonElement) {
                                buttonElement.style.background = newStatus === 'PRESENT' ? '#22c55e' : '#ef4444';
                                buttonElement.style.opacity = '1';
                            }
                            // Revert status badge on error
                            if (row) {
                                updateStatusBadge(row, 'PENDING');
                            }
                        }
                    } else {
                        console.error('Attendance record not found for employee:', empId);
                        auth.showNotification('Attendance record not found', 'error');
                        // Reset button color on error
                        if (buttonElement) {
                            buttonElement.style.background = newStatus === 'PRESENT' ? '#22c55e' : '#ef4444';
                            buttonElement.style.opacity = '1';
                        }
                        // Revert status badge on error
                        if (row) {
                            updateStatusBadge(row, 'PENDING');
                        }
                    }
                } else {
                    auth.showNotification('Failed to fetch attendance records', 'error');
                    // Reset button color on error
                    if (buttonElement) {
                        buttonElement.style.background = newStatus === 'PRESENT' ? '#22c55e' : '#ef4444';
                        buttonElement.style.opacity = '1';
                    }
                    // Revert status badge on error
                    if (row) {
                        updateStatusBadge(row, 'PENDING');
                    }
                }
            } catch (e) {
                console.error('Error in resolvePendingAttendance:', e);
                auth.showNotification('Failed to resolve pending attendance', 'error');
                // Reset button color on error
                if (buttonElement) {
                    buttonElement.style.background = newStatus === 'PRESENT' ? '#22c55e' : '#ef4444';
                    buttonElement.style.opacity = '1';
                }
                // Revert status badge on error
                const row = buttonElement ? buttonElement.closest('tr') : null;
                if (row) {
                    updateStatusBadge(row, 'PENDING');
                }
            }
        }

        // Update status badge immediately when button is clicked
        function updateStatusBadge(row, newStatus) {
            const statusBadge = row.querySelector('.status-badge');
            console.log('updateStatusBadge called with status:', newStatus, 'badge found:', !!statusBadge);
            if (statusBadge) {
                const isPresent = newStatus === 'PRESENT';
                const isAbsent = newStatus === 'ABSENT';
                const isPending = newStatus === 'PENDING';
                
                statusBadge.style.background = isPresent ? '#dcfce7' : isAbsent ? '#fee2e2' : isPending ? '#fef9c3' : '#f3f4f6';
                statusBadge.style.color = isPresent ? '#166534' : isAbsent ? '#991b1b' : isPending ? '#854d0e' : '#6b7280';
                statusBadge.style.border = isPresent ? '1px solid #86efac' : isAbsent ? '1px solid #fca5a5' : isPending ? '1px solid #fde047' : '1px solid #d1d5db';
                statusBadge.textContent = newStatus.replace(/_/g, ' ');
                console.log('Status badge updated to:', newStatus);
            } else {
                console.error('Status badge not found in row');
            }
        }
        
        async function markAllPresent() {
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot mark future dates');
                return;
            }
            
            // SUNDAY CHECK: Block bulk marking on Sundays
            if (isSunday(selectedDate)) {
                showPopup('❌ Sunday is a non-working day. Cannot mark attendance.');
                return;
            }
            
            // Get all employee IDs from the table
            const rows = document.querySelectorAll('#attendance-table tr');
            const empIds = [];
            rows.forEach(row => {
                const btn = row.querySelector('button[onclick*="setAttendance"]');
                if (btn) {
                    const match = btn.getAttribute('onclick').match(/setAttendance\((\d+)/);
                    if (match) empIds.push(match[1]);
                }
            });
            
            // Mark all as present
            for (const empId of empIds) {
                await setAttendance(empId, 'PRESENT');
            }
            
            auth.showNotification(`Marked ${empIds.length} employees as present`, 'success');
        }
        
        async function markAllAbsent() {
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot mark future dates');
                return;
            }
            
            // SUNDAY CHECK: Block bulk marking on Sundays
            if (isSunday(selectedDate)) {
                showPopup('❌ Sunday is a non-working day. Cannot mark attendance.');
                return;
            }
            
            if (!confirm('Are you sure you want to mark all employees as absent?')) return;
            
            const rows = document.querySelectorAll('#attendance-table tr');
            const empIds = [];
            rows.forEach(row => {
                const btn = row.querySelector('button[onclick*="setAttendance"]');
                if (btn) {
                    const match = btn.getAttribute('onclick').match(/setAttendance\((\d+)/);
                    if (match) empIds.push(match[1]);
                }
            });
            
            for (const empId of empIds) {
                await setAttendance(empId, 'ABSENT');
            }
            
            auth.showNotification(`Marked ${empIds.length} employees as absent`, 'success');
        }
        
        async function clearAllAttendance() {
            if (!confirm('Are you sure you want to delete ALL attendance records? This action cannot be undone.')) return;
            try {
                const res = await auth.apiCall('/api/attendance/clear-all', {
                    method: 'DELETE'
                });
                if (res && res.ok) {
                    auth.showNotification('All attendance records deleted successfully', 'success');
                    loadAttendance();
                }
            } catch (e) { auth.showNotification(e.message, 'error'); }
        }
        
        function showPopup(msg) {
            document.getElementById('popup-message').textContent = msg;
            document.getElementById('popup').style.display = 'flex';
        }
        
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }
        
        function logout() { auth.logout(); }
        
        document.getElementById('date-input').addEventListener('change', (e) => {
            selectedDate = e.target.value;
            if (isFutureDate(selectedDate)) {
                showPopup('Cannot select future dates');
                e.target.value = new Date().toISOString().split('T')[0];
                selectedDate = e.target.value;
                return;
            }
            loadAttendance();
        });
        
        loadAttendance();
    </script>
    <style>
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .popup-content { background: white; padding: 2rem; border-radius: 12px; text-align: center; }
        .popup-content button { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        /* Toggle Button Styles */
        .btn-toggle {
            padding: 0.375rem 0.75rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-toggle:hover {
            border-color: #d1d5db;
            background: #f9fafb;
        }
