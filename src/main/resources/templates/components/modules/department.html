<!-- Department Module: Department Management Section -->
<!-- Corresponds to: DepartmentController.java, DepartmentService.java, Department.java -->
<div id="departmentsSection" class="content-section">
    <div class="header">
        <h1>Department Management</h1>
        <p>Manage organizational departments</p>
    </div>
    
    <div class="card">
        <h2>➕ Add/Edit Department</h2>
        <form id="departmentForm" onsubmit="saveDepartment(event)">
            <input type="hidden" id="departmentId">
            <div class="form-group">
                <label>Department Name *</label>
                <input type="text" id="departmentName" placeholder="Enter department name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="departmentDescription" placeholder="Enter department description" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Department Head</label>
                <select id="departmentManager">
                    <option value="">Select Manager</option>
                </select>
            </div>
            <div style="margin-top: 15px;">
                <button type="submit">💾 Save Department</button>
                <button type="button" onclick="closeDepartmentModal()" style="background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-left: 10px;">Cancel</button>
            </div>
        </form>
    </div>
    
    <div class="card">
        <h2>📋 Department List</h2>
        <div class="search-filter-bar">
            <input type="text" id="departmentSearch" placeholder="Search departments..." class="search-input">
            <button onclick="searchDepartments()" class="search-btn">🔍 Search</button>
            <button onclick="showAddDepartmentForm()" class="btn btn-primary">➕ Add Department</button>
            <button onclick="refreshDepartments()">🔄 Refresh</button>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>Department ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Employee Count</th>
                    <th>Manager</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="departmentsList">
                <!-- Dynamically populated -->
            </tbody>
        </table>
    </div>
</div>
