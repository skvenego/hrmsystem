<!-- Document Module: Document Management Section -->
<!-- Corresponds to: Employee document management -->
<div id="documentsSection" class="content-section">
    <div class="header">
        <h1>📁 Document Management</h1>
        <p>Manage employee documents efficiently</p>
    </div>
    
    <div class="card">
        <h2>📤 Upload Document</h2>
        <form id="uploadDocumentForm" class="document-form" onsubmit="uploadDocument(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Employee *</label>
                    <select id="docEmployeeId" required>
                        <option value="">Select Employee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Document Type *</label>
                    <select id="documentType" required>
                        <option value="">Select Document Type</option>
                        <option value="resume">Resume</option>
                        <option value="offer_letter">Offer Letter</option>
                        <option value="id_proof">ID Proof</option>
                        <option value="address_proof">Address Proof</option>
                        <option value="experience_letter">Experience Letter</option>
                        <option value="salary_slip">Salary Slip</option>
                        <option value="pan_card">PAN Card</option>
                        <option value="aadhaar">Aadhaar Card</option>
                        <option value="passport">Passport</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Upload File *</label>
                <div class="file-upload-area">
                    <input type="file" id="documentFile" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" required>
                    <div class="file-info">
                        <small>Maximum file size: 20MB per document</small>
                        <small>Supported formats: PDF, DOC, DOCX, JPG, JPEG, PNG</small>
                    </div>
                </div>
            </div>
            
            <button type="submit">📤 Upload Document</button>
        </form>
    </div>
    
    <div class="card">
        <h2>📋 Employee Documents</h2>
        <div class="document-filters">
            <select id="docEmployeeFilter" class="filter-select">
                <option value="">All Employees</option>
            </select>
            <select id="docTypeFilter" class="filter-select">
                <option value="">All Document Types</option>
                <option value="resume">Resume</option>
                <option value="id_proof">ID Proof</option>
                <option value="address_proof">Address Proof</option>
                <option value="other">Other</option>
            </select>
            <button onclick="refreshDocuments()" class="refresh-btn">🔄 Refresh</button>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Employee Name</th>
                    <th>Document Type</th>
                    <th>File Name</th>
                    <th>Upload Date</th>
                    <th>File Size</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="documentsList">
                <!-- Dynamically populated -->
            </tbody>
        </table>
    </div>
</div>
