<!-- Profile Module: User Profile Section -->
<!-- Corresponds to: User.java, Employee.java profile endpoints -->
<div id="profileSection" class="content-section">
    <div class="header">
        <h1>My Profile</h1>
        <p>Manage your personal information</p>
    </div>
    
    <div class="card">
        <h2>👤 Profile Information</h2>
        <form id="profileForm" onsubmit="handleProfileSubmit(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" id="profileEmployeeId" readonly class="readonly-field">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="profileUsername" readonly class="readonly-field">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="profileFirstName" placeholder="Enter first name" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="profileLastName" placeholder="Enter last name" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="profileEmail" placeholder="Enter email address" required>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="profilePhone" placeholder="Enter phone number">
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <select id="profileGender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="profileDepartment" readonly class="readonly-field">
                </div>
                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" id="profileDesignation" readonly class="readonly-field">
                </div>
            </div>
            
            <div class="form-group">
                <label>Joining Date</label>
                <input type="date" id="profileJoiningDate" readonly class="readonly-field">
            </div>
            
            <div class="form-group">
                <label>Address</label>
                <textarea id="profileAddress" placeholder="Enter your address" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" id="profilePicture" accept="image/*" onchange="uploadProfilePicture(event)">
            </div>
            
            <button type="submit">💾 Update Profile</button>
        </form>
    </div>
</div>
