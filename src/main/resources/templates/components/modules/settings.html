<!-- Settings Module: User Settings Section -->
<!-- Corresponds to: NotificationPreference.java, User settings -->
<div id="settingsSection" class="content-section">
    <div class="header">
        <h1>⚙️ Settings</h1>
        <p>Manage your account settings and preferences</p>
    </div>
    
    <div class="card">
        <h2>🔐 Change Password</h2>
        <form id="settingsForm" onsubmit="handleSettingsSubmit(event)">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter current password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit">🔐 Change Password</button>
        </form>
    </div>
    
    <div class="card">
        <h2>🔔 Notification Preferences</h2>
        <form id="notificationForm" onsubmit="saveNotificationPreferences(event)">
            <div class="form-group checkbox-group">
                <input type="checkbox" id="emailNotifications">
                <label for="emailNotifications">📧 Email Notifications</label>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="smsNotifications">
                <label for="smsNotifications">📱 SMS Notifications</label>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="pushNotifications">
                <label for="pushNotifications">🔔 Push Notifications</label>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="leaveUpdates">
                <label for="leaveUpdates">📝 Leave Updates</label>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="payrollUpdates">
                <label for="payrollUpdates">💰 Payroll Updates</label>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="attendanceUpdates">
                <label for="attendanceUpdates">📅 Attendance Updates</label>
            </div>
            <button type="submit">💾 Save Preferences</button>
        </form>
    </div>
    
    <div class="card">
        <h2>🎨 Appearance</h2>
        <div class="form-group">
            <label>Theme</label>
            <select id="themeSelect" onchange="updateTheme(this.value)">
                <option value="light">☀️ Light</option>
                <option value="dark">🌙 Dark</option>
                <option value="auto">🔄 Auto (System)</option>
            </select>
        </div>
    </div>
    
    <div class="card">
        <h2>🔒 Security</h2>
        <div class="form-group">
            <label>Two-Factor Authentication</label>
            <div class="security-option">
                <span>Enable 2FA for enhanced security</span>
                <button onclick="enable2FA()">Enable 2FA</button>
            </div>
        </div>
    </div>
</div>
