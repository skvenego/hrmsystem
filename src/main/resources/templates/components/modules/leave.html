<!-- Leave Module: Leave Request Section (Employee View) -->
<!-- Corresponds to: LeaveController.java, LeaveService.java, Leave.java -->
<div id="leaveSection" class="content-section">
    <div class="header">
        <h1>Leave Request</h1>
        <p>Apply for leave and view your leave history</p>
    </div>
    
    <div class="card">
        <h2>📝 Apply for Leave</h2>
        <form id="leaveForm" onsubmit="handleLeaveSubmit(event)">
            <div class="form-group">
                <label>Leave Type</label>
                <select id="leaveType">
                    <option value="SICK">Sick Leave</option>
                    <option value="CASUAL">Casual Leave</option>
                    <option value="ANNUAL">Annual Leave</option>
                    <option value="EARNED">Earned Leave</option>
                    <option value="MATERNITY">Maternity Leave</option>
                    <option value="PATERNITY">Paternity Leave</option>
                </select>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <textarea id="leaveReason" placeholder="Enter reason for leave"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate">
                </div>
            </div>
            <button type="submit">Submit Leave Request</button>
        </form>
    </div>
    
    <div class="card">
        <h3>📅 Leave History</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Reason</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="leaveHistory">
                <!-- Dynamically populated -->
            </tbody>
        </table>
    </div>
</div>

<!-- Leave Management Section (Admin/HR View) -->
<div id="leaveManagementSection" class="content-section">
    <div class="header">
        <h1>Leave Management</h1>
        <p>Manage and approve employee leave requests</p>
    </div>
    
    <div class="card">
        <h2>📝 Pending Leave Requests</h2>
        <div class="search-filter-bar">
            <input type="text" id="leaveSearch" placeholder="Search by employee name..." class="search-input">
            <select id="leaveTypeFilter" class="filter-select">
                <option value="">All Types</option>
                <option value="SICK">Sick Leave</option>
                <option value="CASUAL">Casual Leave</option>
                <option value="ANNUAL">Annual Leave</option>
            </select>
            <select id="leaveStatusFilter" class="filter-select">
                <option value="">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="APPROVED">Approved</option>
                <option value="REJECTED">Rejected</option>
            </select>
            <button onclick="searchLeaves()" class="search-btn">🔍 Search</button>
            <button onclick="refreshLeaveRequests()">🔄 Refresh</button>
            <button onclick="exportLeaveRequests()">📥 Export</button>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Leave Type</th>
                    <th>Reason</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="leaveManagementList">
                <!-- Dynamically populated -->
            </tbody>
        </table>
    </div>
</div>
