<!-- Attendance Module: Attendance Management Section -->
<!-- Corresponds to: AttendanceController.java, AttendanceService.java, Attendance.java -->
<div id="attendanceSection" class="content-section">
    <div class="header">
        <h1>Attendance Management</h1>
        <p>Track employee attendance and working hours</p>
    </div>
    
    <div class="card">
        <h2>📅 Mark Attendance</h2>
        <form id="attendanceForm" onsubmit="markAttendance(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Employee *</label>
                    <select id="attendanceEmployeeId" required>
                        <option value="">Select Employee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" id="attendanceDate" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Check In</label>
                    <input type="time" id="checkInTime">
                </div>
                <div class="form-group">
                    <label>Check Out</label>
                    <input type="time" id="checkOutTime">
                </div>
            </div>
            <div class="form-group">
                <label>Status *</label>
                <select id="attendanceStatus" required>
                    <option value="PRESENT">Present</option>
                    <option value="ABSENT">Absent</option>
                    <option value="HALF_DAY">Half Day</option>
                    <option value="LEAVE">Leave</option>
                    <option value="WEEKOFF">Week Off</option>
                </select>
            </div>
            <button type="submit">✅ Mark Attendance</button>
        </form>
    </div>
    
    <div class="card">
        <h2>📊 Attendance Records</h2>
        <div class="search-filter-bar">
            <input type="text" id="attendanceSearch" placeholder="Search by employee name..." class="search-input">
            <input type="date" id="attendanceDateFilter" class="filter-select">
            <select id="attendanceStatusFilter" class="filter-select">
                <option value="">All Status</option>
                <option value="PRESENT">Present</option>
                <option value="ABSENT">Absent</option>
                <option value="HALF_DAY">Half Day</option>
                <option value="LEAVE">Leave</option>
            </select>
            <button onclick="searchAttendance()" class="search-btn">🔍 Search</button>
            <button onclick="markAllPresent()">✅ Mark All Present</button>
            <button onclick="exportAttendance()">📥 Export</button>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Date</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Status</th>
                    <th>Work Hours</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="attendanceList">
                <!-- Dynamically populated -->
            </tbody>
        </table>
    </div>
</div>
