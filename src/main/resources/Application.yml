server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    # Database URL - supports MySQL (dev) and PostgreSQL (prod)
    # MySQL: jdbc:mysql://localhost:3306/hrm_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    # PostgreSQL: jdbc:postgresql://localhost:5432/hrm_db?sslmode=require
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/hrm_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:Sachin@123}
    # Driver class auto-detected from URL, but can be explicit:
    # MySQL: com.mysql.cj.jdbc.Driver
    # PostgreSQL: org.postgresql.Driver
    driver-class-name: ${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: HikariCP
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        # Dialect auto-detected, but can be explicit:
        # MySQL: org.hibernate.dialect.MySQLDialect
        # PostgreSQL: org.hibernate.dialect.PostgreSQLDialect
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
    open-in-view: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  # Email Configuration (Gmail SMTP)
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ThisIsAVerySecureSecretKeyForJWTTokenGenerationThatMustBeAtLeast32CharactersLong!123456}
  expiration: ${JWT_EXPIRATION:86400000}

# Payslip Configuration
payslip:
  pdf:
    output:
      path: ${PAYSLIP_PATH:payslips/}

# Company Details
company:
  name: ${COMPANY_NAME:HRM System}
  address: ${COMPANY_ADDRESS:Your Company Address}

# Logging Configuration
logging:
  level:
    root: INFO
    com.hrm.hrmsystem: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/hrmsystem.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: HRM System
    description: Human Resource Management System
    version: 1.0.0