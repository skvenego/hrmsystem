server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:enego.ct2au2680qip.ap-south-1.rds.amazonaws.com}:3306/hrmsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
    username: ${MYSQL_USER:admin}
    password: ${MYSQL_PASSWORD:Rishu952818}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      transaction-isolation: TRANSACTION_READ_COMMITTED
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: HikariCP
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  
  flyway:
    enabled: false
  
  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:2525}
    username: ${SMTP_USERNAME:abaed9001@smtp-brevo.com}
    password: ${SMTP_PASSWORD:YOUR_SMTP_KEY}
    from: ${SMTP_FROM:skvenego@gmail.com}
    default-encoding: UTF-8
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  web:
    resources:
      cache:
        period: 0
      static-locations: file:src/main/resources/static/
  mvc:
    static-path-pattern: /**

# JWT Configuration
jwt:
  secret: ThisIsAVerySecureSecretKeyForJWTTokenGenerationThatMustBeAtLeast32CharactersLong!123456
  expiration: 86400000

# Payslip Configuration
payslip:
  pdf:
    output:
      path: payslips/

# Company Details
company:
  name: HRM System
  address: Your Company Address

# Logging Configuration
logging:
  level:
    root: INFO
    com.hrm.hrmsystem: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/hrmsystem.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: HRM System
    description: Human Resource Management System
    version: 1.0.0