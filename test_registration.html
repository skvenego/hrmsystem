<!DOCTYPE html>
<html>
<head>
    <title>Test Registration - Phone & Address</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .success { color: green; background: #e8f5e9; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { color: red; background: #ffebee; padding: 15px; border-radius: 5px; margin: 10px 0; }
        button { background: #4f46e5; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #4338ca; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🧪 Test Registration with Phone & Address</h1>
    <button onclick="testRegistration()">Test Registration API</button>
    <div id="result"></div>

    <script>
        async function testRegistration() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            const testData = {
                username: 'testuser_' + Date.now(),
                email: 'test_' + Date.now() + '@example.com',
                password: 'TestPass123!',
                role: 'EMPLOYEE',
                phone: '+1-555-TEST-PHONE',
                address: '789 Database Street, MySQL City, DB 12345'
            };
            
            try {
                // Step 1: Register
                const regResponse = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                if (!regResponse.ok) throw new Error('Registration failed: ' + regResponse.statusText);
                
                const regData = await regResponse.json();
                let html = '<div class="success">';
                html += '<h3>✅ Registration Successful!</h3>';
                html += `<p><strong>User ID:</strong> ${regData.id}</p>`;
                html += `<p><strong>Username:</strong> ${regData.username}</p>`;
                html += `<p><strong>Email:</strong> ${regData.email}</p>`;
                html += '</div>';
                
                // Step 2: Fetch user details to verify storage
                const fetchResponse = await fetch(`/api/auth/users/${regData.id}`, {
                    headers: {
                        'Authorization': `Bearer ${regData.token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!fetchResponse.ok) throw new Error('Fetch failed');
                
                const userData = await fetchResponse.json();
                
                html += '<div class="success">';
                html += '<h3>📊 Database Storage Verification</h3>';
                html += `<p><strong>Phone from DB:</strong> <span style="color:${userData.phone ? 'green' : 'red'}">${userData.phone || 'NULL'}</span></p>`;
                html += `<p><strong>Address from DB:</strong> <span style="color:${userData.address ? 'green' : 'red'}">${userData.address || 'NULL'}</span></p>`;
                html += `<p><strong>Department:</strong> ${userData.department || 'Not set'}</p>`;
                html += `<p><strong>Position:</strong> ${userData.position || 'Not set'}</p>`;
                
                if (userData.phone === testData.phone && userData.address === testData.address) {
                    html += '<p style="color: green; font-weight: bold;">✅ SUCCESS: Phone and Address are correctly stored in MySQL!</p>';
                } else {
                    html += '<p style="color: red; font-weight: bold;">⚠️ Data mismatch detected!</p>';
                }
                html += '</div>';
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error"><h3>Error</h3><p>${error.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
